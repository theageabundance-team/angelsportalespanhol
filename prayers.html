<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a0a08">
<title>Angels Portal — Oraciones Sagradas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  /* Prayers palette — celestial sky */
  --bg:        #05101e;
  --bg-mid:    #081828;
  --bg-card:   #0a1e32;
  --bg-inner:  #061420;
  --bg-nav:    rgba(5,16,30,0.96);
  --sky:       #2e8bc0;
  --sky-lt:    #5ab0e0;
  --sky-br:    #88ccf0;
  --sky-pale:  #d0eefa;
  --sky-dim:   rgba(46,139,192,0.22);
  --sky-glow:  rgba(46,139,192,0.08);
  --gold:      #d4a017;
  --gold-lt:   #f0c040;
  --gold-br:   #ffd460;
  --gold-pale: #faedc4;
  --gold-dim:  rgba(212,160,23,0.22);
  --text:      #e8f4fc;
  --text-dim:  rgba(232,244,252,0.6);
  --radius-lg: 24px; --radius-md:18px; --radius-sm:14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  padding-bottom: 100px;
}

/* Celestial sky atmosphere */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(30,100,180,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 60%, rgba(20,80,140,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(10,60,120,0.08) 0%, transparent 50%);
}

/* Floating light motes */
.embers { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.ember {
  position:absolute; border-radius:50%;
  background:var(--sky-br);
  animation: float-up var(--ed) ease-in-out infinite var(--edelay);
  opacity:0;
}
@keyframes float-up {
  0%   { opacity:0; transform:translateY(0) scale(1); }
  15%  { opacity:var(--eop); }
  85%  { opacity:var(--eop); }
  100% { opacity:0; transform:translateY(-80px) scale(0.4); }
}

/* Shimmer */
.shimmer-overlay { position:fixed; inset:0; z-index:998; pointer-events:none; background:radial-gradient(ellipse at center, rgba(46,139,192,0.18) 0%, transparent 70%); opacity:0; transition:opacity 0.4s; }
.shimmer-overlay.active { opacity:1; }

/* Celebration */
.celebration { position:fixed; inset:0; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity 0.5s ease; background:rgba(18,7,4,0.95); }
.celebration.active { opacity:1; pointer-events:all; }
.celebration-ring { width:120px; height:120px; border-radius:50%; border:2px solid var(--sky); background:var(--bg-inner); display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; box-shadow:0 0 40px rgba(201,122,34,0.3); }
.celebration.active .celebration-ring { animation:ring-expand 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes ring-expand { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
.celebration-ring::before { content:''; position:absolute; inset:-12px; border-radius:50%; border:1px solid var(--sky-dim); animation:ring-pulse-big 2s ease-in-out infinite; }
.celebration-ring::after  { content:''; position:absolute; inset:-24px; border-radius:50%; border:1px solid rgba(46,139,192,0.08); animation:ring-pulse-big 2s ease-in-out infinite 0.3s; }
@keyframes ring-pulse-big { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:0.1;transform:scale(1.08)} }
.celebration-heard { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:var(--sky-lt); margin-top:32px; margin-bottom:12px; opacity:0; }
.celebration.active .celebration-heard { animation:fade-up-cel 0.5s ease 0.4s forwards; }
.celebration-message { font-family:'Cinzel',serif; font-size:26px; font-weight:600; color:var(--text); text-align:center; line-height:1.4; padding:0 32px; opacity:0; max-width:340px; }
.celebration.active .celebration-message { animation:fade-up-cel 0.5s ease 0.55s forwards; }
.celebration-angel { font-size:16px; color:var(--sky-lt); margin-top:10px; font-style:italic; opacity:0; text-align:center; }
.celebration.active .celebration-angel { animation:fade-up-cel 0.5s ease 0.7s forwards; }
@keyframes fade-up-cel { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.particles { position:fixed; inset:0; pointer-events:none; z-index:501; opacity:0; transition:opacity 0.3s; }
.particles.active { opacity:1; }
.particle { position:absolute; width:4px; height:4px; border-radius:50%; background:var(--sky-br); animation:particle-fly var(--pd) ease-out forwards var(--pdelay); opacity:0; }
.particle.star-shape { width:8px; height:8px; background:none; font-size:12px; display:flex; align-items:center; justify-content:center; }
@keyframes particle-fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0.2)} }

/* Topnav */
.topnav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--sky-dim); }
.back-btn { width:40px; height:40px; border-radius:50%; background:var(--bg-card); border:1px solid var(--sky-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--sky-lt); flex-shrink:0; }
.back-btn:active { transform:scale(0.9); }
.nav-center { flex:1; }
.nav-title { font-family:'Cinzel',serif; font-size:16px; font-weight:600; color:var(--gold-lt); letter-spacing:0.06em; }
.nav-sub { font-size:13px; color:var(--text-dim); margin-top:1px; }

/* Today hero — like a lit altar */
.today-hero { position:relative; z-index:5; margin:20px 16px 0; }
.today-card {
  padding:28px 24px 24px;
  border:1px solid rgba(46,139,192,0.3);
  background: linear-gradient(160deg, #0a2040 0%, #061428 60%, #081830 100%);
  border-radius:var(--radius-lg); position:relative; overflow:hidden; cursor:pointer;
  box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,122,34,0.2);
}
.today-card:active { transform:scale(0.985); }
/* Candle glow at top */
.today-card::before {
  content:''; position:absolute; top:-30px; left:50%; transform:translateX(-50%);
  width:200px; height:100px; border-radius:50%;
  background:radial-gradient(ellipse, rgba(46,139,192,0.15) 0%, transparent 70%);
  pointer-events:none;
}
/* Shimmer line */
.today-card::after {
  content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg, transparent, rgba(138,204,240,0.5), transparent);
}
.today-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(46,139,192,0.12); border:1px solid rgba(46,139,192,0.25); border-radius:20px; padding:5px 14px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; color:var(--gold-lt); text-transform:uppercase; margin-bottom:16px; }
.today-dot { width:7px; height:7px; border-radius:50%; background:var(--sky-br); animation:flicker 1.5s ease-in-out infinite; }
@keyframes flicker { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }
.today-date { font-family:'Cinzel',serif; font-size:13px; color:rgba(245,237,224,0.45); letter-spacing:0.1em; margin-bottom:6px; text-transform:uppercase; }
.today-title { font-family:'Cinzel',serif; font-size:24px; font-weight:600; color:var(--gold-pale); letter-spacing:0.03em; line-height:1.3; margin-bottom:6px; }
.today-week-theme { font-size:15px; color:rgba(245,237,224,0.55); margin-bottom:22px; font-style:italic; }
.today-btn {
  display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  background:linear-gradient(160deg, #f0c040 0%, #d4a017 50%, #b8860b 100%);
  color:#1a0f00; font-family:'Cinzel',serif; font-size:15px; font-weight:700;
  letter-spacing:0.09em; padding:17px; border-radius:14px; border:none; cursor:pointer;
  box-shadow:0 4px 24px rgba(212,160,23,0.4), 0 1px 0 rgba(255,220,100,0.4) inset;
  transition:transform 0.15s; position:relative; overflow:hidden;
}
.today-btn::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:14px 14px 0 0; }
.today-btn:active { transform:scale(0.97); }
.today-btn.done { background:linear-gradient(135deg,#2a6a3a,#1a4a28); box-shadow:0 4px 18px rgba(42,106,58,0.4); color:#c0ffd0; }
.today-deco { position:absolute; right:-10px; bottom:-10px; font-size:100px; opacity:0.05; pointer-events:none; color:var(--sky); line-height:1; font-family:'Cinzel',serif; }

/* Progress */
.progress-wrap { position:relative; z-index:5; margin:16px 16px 0; }
.progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.progress-lbl { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--sky); }
.progress-val { font-family:'Cinzel',serif; font-size:13px; font-weight:600; color:var(--gold-lt); }
.progress-bar { height:5px; background:var(--bg-inner); border-radius:3px; overflow:hidden; border:1px solid var(--sky-dim); }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-br)); border-radius:3px; transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1); }

/* Section header */
.section-header { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-lt); padding:24px 20px 12px; position:relative; z-index:5; display:flex; align-items:center; gap:10px; }
.section-header::after { content:''; flex:1; height:1px; background:var(--sky-dim); }

/* Week blocks */
.week-block { position:relative; z-index:5; margin:0 16px 12px; }
.week-header { display:flex; align-items:center; gap:14px; padding:18px 20px; border-radius:var(--radius-lg) var(--radius-lg) 0 0; border:1px solid var(--sky-dim); border-bottom:none; cursor:pointer; transition:background 0.3s; background:linear-gradient(135deg,rgba(46,139,192,0.08),var(--bg-card)); }
.week-block:not(.open) .week-header { border-radius:var(--radius-lg); border-bottom:1px solid var(--sky-dim); }
.week-block.color-crimson .week-header { background:linear-gradient(135deg,rgba(140,30,20,0.15),var(--bg-card)); border-color:rgba(180,60,40,0.25); }
.week-block.color-crimson:not(.open) .week-header { border-color:rgba(180,60,40,0.25); }
.week-num-badge { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:15px; font-weight:700; flex-shrink:0; }
.color-amber .week-num-badge { background:rgba(201,122,34,0.15); border:1px solid var(--sky-dim); color:var(--amber-lt); }
.color-crimson .week-num-badge { background:rgba(180,60,40,0.15); border:1px solid rgba(180,60,40,0.3); color:#f0907a; }
.week-info { flex:1; }
.week-tag { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.13em; text-transform:uppercase; margin-bottom:3px; }
.color-sky .week-tag { color:var(--gold); }
.color-crimson .week-tag { color:var(--gold); }
.week-name { font-family:'Cinzel',serif; font-size:16px; font-weight:600; color:var(--gold-pale); }
.week-chevron { font-size:20px; color:var(--text-dim); transition:transform 0.3s; }
.week-block.open .week-chevron { transform:rotate(90deg); }
.week-days { border:1px solid var(--sky-dim); border-top:none; border-radius:0 0 var(--radius-lg) var(--radius-lg); overflow:hidden; display:none; }
.week-block.color-crimson .week-days { border-color:rgba(180,60,40,0.25); }
.week-block.open .week-days { display:block; }
.day-row { display:flex; align-items:center; gap:14px; padding:16px 20px; cursor:pointer; border-bottom:1px solid var(--amber-dim); background:var(--bg-card); transition:background 0.2s; position:relative; overflow:hidden; }
.week-block.color-crimson .day-row { border-color:rgba(180,60,40,0.2); }
.day-row:last-child { border-bottom:none; }
.day-row:active { background:var(--bg-inner); }
.day-row.today-row { background:linear-gradient(135deg,rgba(46,139,192,0.08),var(--bg-card)); }
.day-row.today-row::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:linear-gradient(180deg,var(--sky),var(--sky-br)); }
.day-row.locked { opacity:0.35; cursor:not-allowed; }
.day-circle { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:14px; font-weight:600; flex-shrink:0; border:1.5px solid var(--amber-dim); color:var(--text-dim); background:var(--bg-inner); }
.day-row.done-row .day-circle { background:linear-gradient(135deg,var(--gold),var(--gold-br)); border-color:transparent; color:#1a0f00; }
.day-row.today-row .day-circle { border-color:var(--sky-lt); color:var(--sky-lt); box-shadow:0 0 0 3px rgba(46,139,192,0.15); }
.day-info { flex:1; }
.day-date { font-size:12px; color:rgba(212,160,23,0.55); font-family:'Cinzel',serif; letter-spacing:0.06em; margin-bottom:2px; }
.day-title { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold-pale); }
.day-row.locked .day-title { color:var(--text-dim); }
.day-status { font-size:18px; flex-shrink:0; }

/* Prayer modal */
.prayer-modal { position:fixed; inset:0; z-index:200; overflow-y:auto; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); background:var(--bg); }
.prayer-modal.open { transform:translateY(0); }
/* Warm glow behind text */
.prayer-modal::before { content:''; position:fixed; top:0; left:0; right:0; height:300px; background:radial-gradient(ellipse 80% 60% at 50% -20%, rgba(180,80,20,0.15) 0%, transparent 70%); pointer-events:none; z-index:0; }
.modal-topnav { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--sky-dim); }
.modal-close { width:40px; height:40px; border-radius:50%; background:var(--bg-card); border:1px solid var(--sky-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--sky-lt); flex-shrink:0; }
.modal-close:active { transform:scale(0.9); }
.modal-title-wrap { flex:1; }
.modal-title { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--sky-lt); letter-spacing:0.04em; }
.modal-sub { font-size:13px; color:var(--text-dim); margin-top:1px; }
.modal-body { padding:28px 24px; position:relative; z-index:1; }
.modal-week-tag { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--sky-lt); margin-bottom:8px; }
.modal-prayer-title { font-family:'Cinzel',serif; font-size:26px; font-weight:600; color:var(--sky-pale); line-height:1.3; margin-bottom:20px; }
.modal-divider { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
.modal-divider-line { flex:1; height:1px; background:var(--amber-dim); }
.modal-divider-gem { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); opacity:0.7; flex-shrink:0; }
.modal-prayer-text { font-size:19px; color:var(--text); line-height:2.1; }
.modal-prayer-text p + p { margin-top:24px; }
.modal-ornament { text-align:center; padding:28px 0 22px; color:var(--gold-dim); font-size:20px; letter-spacing:12px; }
.modal-actions { display:flex; gap:10px; padding-bottom:40px; }
.modal-pray-btn { flex:1; padding:18px; border-radius:16px; border:none; background:linear-gradient(160deg,#f0c040 0%,#d4a017 50%,#b8860b 100%); color:#1a0f00; font-family:'Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:0.08em; cursor:pointer; box-shadow:0 4px 22px rgba(212,160,23,0.4),0 1px 0 rgba(255,220,100,0.4) inset; transition:transform 0.15s; position:relative; overflow:hidden; }
.modal-pray-btn::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:16px 16px 0 0; }
.modal-pray-btn:active { transform:scale(0.97); }
.modal-pray-btn.done { background:linear-gradient(135deg,#2a6a3a,#1a4a28); box-shadow:0 4px 18px rgba(42,106,58,0.4); color:#c0ffd0; }
.modal-share-btn { padding:18px 20px; border-radius:16px; border:1px solid var(--sky-dim); background:transparent; color:var(--text-dim); font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.06em; cursor:pointer; }

/* Bottom nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:100; display:flex; background:var(--bg-nav); backdrop-filter:blur(20px); border-top:1px solid var(--sky-dim); padding:8px 0 max(18px,env(safe-area-inset-bottom)); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:10px 0; min-height:56px; justify-content:center; }
.nav-item:active { opacity:0.7; }
.nav-item-icon { font-size:24px; }
.nav-item-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); }
.nav-item.active .nav-item-label { color:var(--gold-lt); font-weight:600; }
.nav-item.active .nav-item-icon { filter:drop-shadow(0 0 8px rgba(212,160,23,0.6)); }
.nav-item.active::after { content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--gold); margin-top:2px; }

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--sky-dim);border-radius:4px}
</style>
</head>
<body>

<div class="embers" id="embers"></div>
<div class="shimmer-overlay" id="shimmer"></div>

<div class="celebration" id="celebration">
  <div class="celebration-ring">🕯️</div>
  <div class="celebration-heard">El Cielo ha escuchado</div>
  <div class="celebration-message" id="celebrationMsg">Tu oración ha sido recibida</div>
  <div class="celebration-angel" id="celebrationAngel">— Arcángel Gabriel</div>
</div>
<div class="particles" id="particles"></div>

<div class="prayer-modal" id="prayerModal">
  <div class="modal-topnav">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-title-wrap">
      <div class="modal-title" id="modalTitle">—</div>
      <div class="modal-sub" id="modalSub">—</div>
    </div>
  </div>
  <div class="modal-body">
    <div class="modal-week-tag" id="modalWeekTag">—</div>
    <div class="modal-prayer-title" id="modalPrayerTitle">—</div>
    <div class="modal-divider"><div class="modal-divider-line"></div><div class="modal-divider-gem"></div><div class="modal-divider-line"></div></div>
    <div class="modal-prayer-text" id="modalPrayerText"></div>
    <div class="modal-ornament">✦ · ✦ · ✦</div>
    <div class="modal-actions">
      <button class="modal-pray-btn" id="modalPrayBtn" onclick="markPrayed()">🙏 He rezado esto hoy</button>
      <button class="modal-share-btn">↑ Compartir</button>
    </div>
  </div>
</div>

<!-- Topnav -->
<div class="topnav">
  <div class="back-btn" onclick="window.location.href='index.html'">‹</div>
  <div class="nav-center">
    <div class="nav-title">Oraciones Sagradas</div>
    <div class="nav-sub" id="navSub">—</div>
  </div>
</div>

<!-- Today -->
<div class="today-hero">
  <div class="today-card" onclick="openTodayPrayer()">
    <div class="today-badge"><div class="today-dot"></div> Oración de Hoy</div>
    <div class="today-date" id="todayDate">—</div>
    <div class="today-title" id="todayTitle">—</div>
    <div class="today-week-theme" id="todayTheme">—</div>
    <button class="today-btn" id="todayBtn">🕯️ Leer la Oración de Hoy</button>
    <div class="today-deco">✦</div>
  </div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-row"><div class="progress-lbl">Tu camino de oración</div><div class="progress-val" id="progressVal">0 oraciones rezadas</div></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="section-header">Todas las Oraciones</div>
<div id="weeksContainer"></div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'"><div class="nav-item-icon">🏛️</div><div class="nav-item-label">Inicio</div></div>
  <div class="nav-item" onclick="window.location.href='chat.html'"><div class="nav-item-icon">💬</div><div class="nav-item-label">Chat</div></div>
  <div class="nav-item" onclick="window.location.href='journey.html'"><div class="nav-item-icon">🔥</div><div class="nav-item-label">Camino</div></div>
  <div class="nav-item active"><div class="nav-item-icon">🕯️</div><div class="nav-item-label">Oraciones</div></div>
</div>

<script>
const WEEKS = [
  { id:1, theme:"Protección y Abundancia", angel:"Arcángel Gabriel", color:"sky",
    days:[
      { title:"Escudo de Luz", content:"Arcángel Gabriel, mensajero de luz y esperanza, te pido que seas mi escudo y mi guía. Rodea mis caminos con tu luz de pureza, ahuyentando toda sombra de miedo o duda, y protegiendo mi espíritu de las adversidades y energías negativas que intenten cruzar mi senda.\n\nInvoco también tu intercesión para que la abundancia fluya en mi vida como un río inagotable. Que las puertas de la prosperidad se abran al sonido de tu trompeta, trayendo plenitud a mi mesa, claridad a mis asuntos y paz a mi corazón, bajo la constante vigilancia de los ángeles de la provisión. Amén." },
      { title:"Protección Sobre Mi Hogar", content:"Glorioso Gabriel, tú que anunciaste el mayor milagro de la humanidad, anuncia hoy seguridad dentro de mi hogar. Que tus alas blancas cubran a mi familia, creando un perímetro de protección donde solo el amor y la armonía puedan entrar, repeliendo toda escasez.\n\nTe pido que, junto al Arcángel Miguel, cortes las cadenas de la limitación financiera. Que la abundancia divina llegue a mí desde fuentes esperadas e inesperadas, multiplicando mis recursos para que yo también pueda ser un canal de bendiciones en la vida de los demás." },
      { title:"Palabras y Cosecha", content:"Santo Arcángel Gabriel, maestro de la comunicación divina, protege mis palabras y mis interacciones hoy. Que esté resguardado de los malentendidos, y que mi cosecha sea protegida por tu fuerza celestial.\n\nQue la energía de la abundancia se manifieste en mi salud y vitalidad. Con la ayuda del Arcángel Rafael, pido que mi cuerpo sea un templo de vigor, permitiéndome tener la energía para construir mi prosperidad y disfrutar de las maravillas que el universo me ofrece." },
      { title:"Sueños y Oportunidad", content:"Arcángel Gabriel, portador de buenas noticias, vela por mis sueños y mis proyectos. Que ninguna influencia externa desvíe mi enfoque de la victoria, y que tu luz purificadora limpie cualquier rastro de envidia u obstáculos en mi camino profesional.\n\nInvoco la plenitud celestial para que mi vida desborde de oportunidades. Que la sabiduría de Gabriel me muestre dónde plantar mis semillas para que la abundancia sea el resultado natural de cada esfuerzo que realice." },
      { title:"Armadura de Luz", content:"En este día, pido al Arcángel Gabriel que selle mis caminos con su pureza cristalina. Que tu protección sea como una armadura de luz, impidiendo que los peligros de la vida cotidiana toquen mi integridad física o emocional.\n\nQue la abundancia no sea solo un concepto, sino una realidad viva en mis manos. Que el flujo de dinero, ideas y buenas conexiones sea constante, trayendo la certeza de que estoy plenamente provisto por el cielo." },
      { title:"Descanso y Renovación", content:"Arcángel Gabriel, ángel de la anunciación y del descanso sagrado, protege mi tiempo de descanso y renovación. Que tu presencia en mi hogar aleje toda preocupación, y que sienta la seguridad de estar bajo la mirada vigilante de las legiones celestiales.\n\nDoy gracias por la abundancia de momentos felices y por la prosperidad que ya mora en mí. Que Gabriel continúe anunciando bendiciones sobre todos los que amo." },
      { title:"Cerrando el Ciclo", content:"Arcángel Gabriel, purifica mi alma de todo cansancio y renueva mi protección para el nuevo ciclo que se avecina. Que descanse bajo el manto de tu serenidad y me levante nuevamente con la fuerza de un vencedor, listo para recibir los milagros que están por venir.\n\nQue la semilla de abundancia plantada durante estos días florezca con intensidad. Con la ayuda de todos los ángeles guardianes, pido que la prosperidad espiritual y material sea el fundamento de mi vida, ahora y siempre. Amén." }
    ]
  },
  { id:2, theme:"Claridad y Revelación", angel:"Arcángel Gabriel", color:"crimson",
    days:[
      { title:"Visión Clara al Amanecer", content:"Arcángel Gabriel, tú que traes los mensajes del Altísimo, limpia mi visión en este nuevo comienzo. Te pido que retires las nieblas de la confusión mental para que pueda ver con claridad cada oportunidad y cada paso que debo dar.\n\nQue la revelación divina ilumine mi intuición. Con la ayuda del Arcángel Uriel, pido que la luz de la verdad brille en mi mente, permitiéndome tomar decisiones basadas en la sabiduría y no en la incertidumbre." },
      { title:"Escucha Sagrada", content:"Santo Gabriel, ángel de pureza, purifica mi escucha espiritual. Que sea capaz de oír los susurros del cielo en medio del ruido del mundo, comprendiendo la guía que me es enviada para mi crecimiento y evolución personal.\n\nDame claridad sobre mis misiones cotidianas. Que no me pierda en las distracciones, y que tu trompeta suene en mi corazón cada vez que necesite un recordatorio de lo que es verdaderamente esencial." },
      { title:"Verdad en las Relaciones", content:"Arcángel Gabriel, guía mis pensamientos hacia la luz. Te pido que traigas claridad a mis relaciones y conversaciones, para que la verdad pueda ser expresada con amor.\n\nQue la revelación de nuevos caminos se manifieste en mi vida. Pido que el Arcángel Gabriel abra mi entendimiento a nuevas ideas y soluciones creativas que antes estaban ocultas a mis ojos." },
      { title:"Mente Iluminada", content:"Glorioso Gabriel, protector de los que buscan la verdad, ilumina mis estudios y mi trabajo. Que tenga facilidad para aprender y claridad para enseñar, convirtiéndome en un canal transparente de inteligencia divina dondequiera que vaya.\n\nAléjame de toda ilusión y engaño. Que la fuerza de Gabriel revele las verdaderas intenciones detrás de las palabras de los demás, dándome el discernimiento necesario para caminar con seguridad y confianza." },
      { title:"Evaluación Honesta", content:"Arcángel Gabriel, te pido que traigas claridad sobre los resultados de mis esfuerzos. Que evalúe mi camino con honestidad, y que las revelaciones del cielo me muestren dónde debo ajustar mis planes.\n\nQue el Arcángel Jofiel se una a Gabriel para embellecer mis pensamientos. Que vea claridad en la belleza y verdad en la simplicidad, llegando a un lugar de mente liviana y espíritu en paz." },
      { title:"Revelación en el Descanso", content:"Arcángel Gabriel, ángel de la revelación, trae luz a mis momentos de quietud. Que mi alma sea instruida por ti durante este tiempo de descanso, y que reciba una guía clara con serenidad y fe.\n\nDoy gracias por la claridad que he recibido. Que la luz de Gabriel continúe brillando en mí, revelando que la mayor verdad es el amor que Dios tiene por mí y por toda la creación." },
      { title:"Espejo del Alma", content:"Al cerrar este ciclo de claridad, Arcángel Gabriel, afirmo mi compromiso con la verdad. Que no tema lo que me sea revelado, pues la luz divina solo expone lo que necesita ser sanado o fortalecido para mi bien.\n\nQue los días que vienen sean guiados por una visión cristalina. Pido que Gabriel mantenga mi mente como un espejo limpio de la voluntad del Creador, hoy y siempre. Amén." }
    ]
  },
  { id:3, theme:"Entrega y Gracia", angel:"Arcángel Miguel", color:"sky",
    days:[
      { title:"Soltando en el Umbral", content:"Arcángel Miguel, guerrero del cielo y guardián de mi alma, me encuentro en el umbral de un nuevo comienzo. Te pido que tu espada de luz corte cada vínculo que me ata a lo que debo soltar: los miedos que he nombrado y los que no me atrevo a pronunciar en voz alta. Enséñame que soltar no es perder, sino hacer espacio para lo que el cielo ya ha preparado.\n\nEntrego a tu cuidado todo lo que he estado intentando controlar por mi cuenta. Que tu presencia, a la vez feroz y tierna, me recuerde que no estoy abandonado en este vacío, sino sostenido por la gracia. Guía mi próximo paso incluso cuando no pueda ver el suelo bajo mis pies. Amén." },
      { title:"El Peso que Ya No Cargo", content:"Santo Miguel, vengo a ti cargando lo que nunca fue mío llevar solo. Las preocupaciones del mañana, las heridas del ayer, los juicios que he vuelto contra mí mismo: los deposito todos a tus pies. Que tu escudo dorado me refleje solo lo que es verdadero y bueno, consumiendo todo lo demás con compasión.\n\nPido la gracia de un espíritu más liviano. Que transcurra este día sin cargas, confiando en que cada necesidad será satisfecha en su tiempo. Que tu presencia sea el suelo bajo mis pies cuando mis propias fuerzas cedan, y recuérdale a mi corazón que fue hecho para la paz, no para la lucha." },
      { title:"Manos Abiertas", content:"Arcángel Miguel, abro mis manos ante el cielo hoy. Suelto mi apego a resultados que he estado apretando demasiado fuerte, a palabras que desearía no haber dicho, a caminos que ya se cerraron detrás de mí. Que tu luz fluya a través de mis palmas abiertas y consagre este acto de entrega como una ofrenda de confianza.\n\nLlena ahora estas manos con lo que verdaderamente me pertenece: propósito, valentía y la silenciosa certeza de que estoy guiado. Que todo bien que estoy destinado a recibir me encuentre con las manos y el corazón abiertos de par en par, listo para custodiar cada don con fidelidad y gratitud." },
      { title:"Paz en lo Desconocido", content:"Glorioso Miguel, comandante de los ejércitos celestiales, confieso que lo desconocido me inquieta. Pero nunca has estado ausente de los lugares oscuros, y hoy pido la paz que no depende de las respuestas. Que tu presencia sea el punto de quietud en el centro de mi incertidumbre, la calma que sostiene incluso cuando mi mente no puede descansar.\n\nPido que la sabiduría divina me alcance en el silencio entre mis preguntas. Que aprenda a habitar lo desconocido no con temor, sino con la expectativa de un peregrino que confía en el guía. Camina conmigo a través de lo que aún no puedo ver, y que tu luz sea suficiente para cada paso." },
      { title:"Confiando en el Río", content:"Arcángel Miguel, tú que te mueves por los cielos sin vacilación, enséñame el arte de la entrega sagrada. He pasado muchos días nadando contra la corriente de mi propia vida. Hoy elijo confiar en el río: creer que el flujo de la gracia me lleva hacia destinos más grandes de los que he imaginado.\n\nRodéame de la certeza de que entregarse no es debilidad sino sabiduría. Que los ángeles de la paz me acompañen hoy, susurrando que estoy exactamente donde necesito estar. Que el tiempo divino trabaje a mi favor, y que suelte la necesidad de forzar lo que solo la gracia puede abrir." },
      { title:"Gracia en la Debilidad", content:"Santo Arcángel Miguel, vengo a ti no en triunfo sino en honestidad: reconociendo los lugares donde me he quedado corto, los momentos en que no alcancé el estándar que me exijo. Pido la gracia que me encuentra en mi debilidad, no con condenación, sino con el amor firme del cielo.\n\nQue tu protección se extienda no solo a mi alrededor sino dentro de mí, guardando los lugares tiernos que generalmente mantengo ocultos. Pido la fuerza para ser gentil conmigo mismo, para ver mis limitaciones no como defectos sino como invitaciones a apoyarme en algo más grande. Que la gracia tenga la última palabra hoy." },
      { title:"El Don de lo Suficiente", content:"Arcángel Miguel, al cerrar esta semana de entrega, doy gracias por la gracia que me sostuvo. Declaro hoy que soy suficiente: no porque haya hecho todo bien, sino porque soy sostenido por un amor que no depende de mi desempeño.\n\nQue esta verdad se asiente profundamente en mi ser y se convierta en el fundamento desde el cual me muevo hacia los días que vienen. Te pido que sellesesta semana con tu protección divina, llevando adelante todo lo que fue ofrecido y todo lo que fue recibido. Que entre en la próxima etapa de mi camino descansado, restaurado y listo. Amén." }
    ]
  },
  { id:4, theme:"Renovación y Resurgimiento", angel:"Arcángel Rafael", color:"crimson",
    days:[
      { title:"Nuevo Aliento", content:"Arcángel Rafael, sanador de almas y médico del cielo, insufla nueva vida en mí hoy. Donde el agotamiento se ha asentado en mis huesos, pido tu viento renovador. Que cada parte de mi ser sea tocada por la vitalidad divina, y que los lugares donde he sido desgastado se conviertan precisamente en los lugares donde comienza la restauración.\n\nMe abro a una sanación que va más allá de lo físico: la sanación de los recuerdos, de las heridas llevadas en silencio, de los golpes tiernos que he aprendido a sortear. Que tu luz se mueva a través de mí como un río de restauración, dejando plenitud a su paso." },
      { title:"Sanando lo que las Palabras No Pudieron", content:"Santo Rafael, tú que alcanzas los lugares donde el lenguaje falla. Te traigo hoy las heridas que nunca he podido explicar del todo: el duelo sin nombre, el amor que quedó sin expresar, las disculpas que llegaron demasiado tarde o no llegaron nunca. Te pido que tu presencia sanadora se mueva hacia estos espacios sin palabras.\n\nQue el consuelo divino me encuentre donde la lógica no puede. Que reciba la ternura del cielo como bálsamo para lo que aún duele, y que extienda esa misma ternura hacia los demás que cargan sus propias heridas invisibles. Que la sanación sea un círculo que tanto recibo como doy." },
      { title:"Raíces y Alas", content:"Arcángel Rafael, pido la sabiduría para saber cuándo sostener y cuándo volar. Que fortalezcas mis raíces: mi sentido de pertenencia, mi conexión con lo sagrado, mi confianza en quienes me aman fielmente. Que estas raíces sean tan profundas que ningún viento de las circunstancias pueda desarraigar la paz que mora en mí.\n\nY luego dame alas: el valor para elevarse por encima de los viejos patrones, para ver mi vida desde un punto de vista más alto, para creer que el horizonte guarda más de lo que ya he conocido. Que tu presencia sanadora sea el puente entre mi arraigo más profundo y mi aspiración más elevada." },
      { title:"El Coraje de Comenzar de Nuevo", content:"Glorioso Rafael, compañero de los viajeros y guardián de los nuevos comienzos, pido hoy el valor para empezar de nuevo. No porque haya borrado mi historia, sino porque elijo no estar atado a ella. Que tu luz sanadora disuelva la vergüenza de los fracasos pasados y la reemplace con la energía fresca de una nueva mañana.\n\nPido que el Arcángel Miguel se una a ti hoy para despejar el camino de cualquier obstáculo restante. Que avance con la ligereza de alguien que ha sido genuinamente perdonado: no cargando el pasado sino aprendiendo de él, libre de poner un pie delante del otro con esperanza." },
      { title:"Plenitud", content:"Arcángel Rafael, pido hoy no la perfección sino la plenitud. Que las partes fragmentadas de mí mismo: las ocultas y las visibles, las celebradas y las avergonzadas, sean reunidas y sostenidas juntas en la luz del amor divino. No necesito tenerlo todo resuelto para estar completo.\n\nQue tu toque sanador alcance las versiones más jóvenes de mí que aún esperan ser tranquilizadas, que aún contienen la respiración. Diles que están seguros. Diles que son amados. Diles que la historia termina mejor de lo que temían. Recibo esta sanación en nombre de ellos y en el mío, confiando en que la plenitud no se gana sino que se recibe." },
      { title:"Caminando en la Luz", content:"Santo Rafael, al acercarse el cierre de este mes, te pido que camines a mi lado en la luz. Que mis pasos sean guiados no por la ansiedad sobre lo que hay por delante, sino por la tranquila confianza de alguien que ha sido acompañado en cada estación. Que la gratitud sea mi paso y la confianza mi dirección.\n\nDoy gracias por cada sanación que ocurrió de maneras que no esperaba: a través de una conversación, un silencio, un giro repentino en la perspectiva. Que reconozca la mano del cielo en las pequeñas misericordias con la misma facilidad que en las grandes, y lleve esta conciencia como un farol hacia los días por venir." },
      { title:"Pacto de Alegría", content:"Arcángel Rafael, cierro este mes con una declaración de alegría. No la felicidad fugaz que depende de las circunstancias, sino la alegría profunda e inquebrantable que viene de saber que soy amado, sostenido y acompañado. Que esta alegría sea un pacto entre mi alma y el cielo: una promesa a la que vuelvo cada vez que el miedo intenta hacerme olvidar.\n\nQue la renovación que comenzó en estos días continúe desplegándose en las semanas y meses que vienen. Te pido que lleves esta oración adelante, Rafael, como sello de todo lo que ha sido sanado, abierto y hecho nuevo. Que entre en lo que viene con el corazón lleno, los ojos claros y la fe de que lo mejor aún está por llegar. Amén." }
    ]
  }
];

// Mescla progresso local com o do Supabase (ap_prayers vem do login)
const localPrayed = JSON.parse(localStorage.getItem('ap_prayed')||'{}');
const cloudPrayed = JSON.parse(localStorage.getItem('ap_prayers')||'{}');
let prayed = Object.assign({}, localPrayed, cloudPrayed); // cloud tem prioridade
localStorage.setItem('ap_prayed', JSON.stringify(prayed)); // sincroniza local
const USER_EMAIL_P = localStorage.getItem('ap_email') || '';

// Sincroniza prayers_done com Supabase em background
function syncPrayersToCloud() {
  if (!USER_EMAIL_P) return;
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: USER_EMAIL_P, prayers_done: prayed })
  }).catch(e => console.error('Sync prayers error:', e));
}
let modalWeek=0, modalDay=0;

function getJoinDate() {
  const raw = localStorage.getItem('ap_joined');
  if (!raw) return new Date(); // sem data = dia 1
  const d = new Date(raw);
  return isNaN(d.getTime()) ? new Date() : d;
}
function getDayNumber() { return Math.max(1, Math.floor((new Date()-getJoinDate())/86400000)+1); }
function getDayInfo(n) { const wi=Math.floor((n-1)/7),di=(n-1)%7; if(wi>=WEEKS.length)return null; return{week:WEEKS[wi],wi,di}; }
function formatDate(d) { return d.toLocaleDateString('es-ES',{month:'long',day:'numeric'}); }

window.addEventListener('load',()=>{
  buildEmbers();
  const dayNum=getDayNumber(), info=getDayInfo(dayNum), today=new Date();
  document.getElementById('navSub').textContent=formatDate(today);
  if(info){
    const key=`${info.wi}-${info.di}`, done=prayed[key];
    document.getElementById('todayDate').textContent=formatDate(today).toUpperCase();
    document.getElementById('todayTitle').textContent=info.week.days[info.di].title;
    document.getElementById('todayTheme').textContent=`Semana ${info.wi+1} · ${info.week.theme}`;
    const btn=document.getElementById('todayBtn');
    if(done){btn.textContent='✦ Oración completada hoy';btn.classList.add('done');}
  }
  buildAccordion(); updateProgress();
});

function buildEmbers(){
  const el=document.getElementById('embers');
  for(let i=0;i<20;i++){
    const e=document.createElement('div');
    const sz=Math.random()<0.3?3:Math.random()<0.6?2:1;
    e.className='ember';
    e.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*30}%;--ed:${3+Math.random()*4}s;--edelay:${Math.random()*4}s;--eop:${0.3+Math.random()*0.5}`;
    el.appendChild(e);
  }
}

function buildAccordion(){
  const dayNum=getDayNumber(), container=document.getElementById('weeksContainer');
  container.innerHTML='';
  WEEKS.forEach((week,wi)=>{
    const firstDay=wi*7+1, isCurrent=dayNum>=firstDay&&dayNum<firstDay+7;
    const block=document.createElement('div');
    block.className=`week-block color-${week.color}${isCurrent?' open':''}`;
    block.innerHTML=`
      <div class="week-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="week-num-badge">${wi+1}</div>
        <div class="week-info"><div class="week-tag">${week.angel}</div><div class="week-name">${week.theme}</div></div>
        <div class="week-chevron">›</div>
      </div>
      <div class="week-days"></div>`;
    container.appendChild(block);
    const daysEl=block.querySelector('.week-days');
    week.days.forEach((day,di)=>{
      const gd=wi*7+di+1, isToday=gd===dayNum, isLocked=gd>dayNum;
      const key=`${wi}-${di}`, done=prayed[key];
      const dd=new Date(getJoinDate()); dd.setDate(getJoinDate().getDate()+wi*7+di);
      const row=document.createElement('div');
      row.className='day-row'+(isToday?' today-row':'')+(done?' done-row':'')+(isLocked?' locked':'');
      row.innerHTML=`
        <div class="day-circle">${done?'✦':di+1}</div>
        <div class="day-info"><div class="day-date">${isToday?'📍 Hoy · ':''}${formatDate(dd)}</div><div class="day-title">${day.title}</div></div>
        <div class="day-status">${done?'✅':isToday?'🕯️':isLocked?'🔒':'›'}</div>`;
      if(!isLocked) row.onclick=()=>openPrayer(wi,di);
      daysEl.appendChild(row);
    });
  });
}

function openTodayPrayer(){ const i=getDayInfo(getDayNumber()); if(i)openPrayer(i.wi,i.di); }

function openPrayer(wi,di){
  const week=WEEKS[wi], day=week.days[di], key=`${wi}-${di}`, done=prayed[key];
  modalWeek=wi; modalDay=di;
  const dd=new Date(getJoinDate()); dd.setDate(getJoinDate().getDate()+wi*7+di);
  document.getElementById('modalTitle').textContent=day.title;
  document.getElementById('modalSub').textContent=formatDate(dd);
  document.getElementById('modalWeekTag').textContent=`Semana ${wi+1} · ${week.theme} · ${week.angel}`;
  document.getElementById('modalPrayerTitle').textContent=day.title;
  document.getElementById('modalPrayerText').innerHTML=day.content.split('\n\n').map(p=>`<p>${p}</p>`).join('');
  const btn=document.getElementById('modalPrayBtn');
  if(done){btn.textContent='✦ Oración completada';btn.classList.add('done');}
  else{btn.textContent='🙏 He rezado esto hoy';btn.classList.remove('done');}
  document.getElementById('prayerModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){ document.getElementById('prayerModal').classList.remove('open'); document.body.style.overflow=''; }

function markPrayed(){
  const key=`${modalWeek}-${modalDay}`;
  if(prayed[key])return;
  prayed[key]=true; localStorage.setItem('ap_prayed',JSON.stringify(prayed));
  syncPrayersToCloud();
  const btn=document.getElementById('modalPrayBtn');
  btn.textContent='✦ Oración completada'; btn.classList.add('done');
  showCelebration();
  setTimeout(()=>{ buildAccordion(); updateProgress(); },500);
}

function updateProgress(){
  let total=0,done=0;
  WEEKS.forEach((w,wi)=>w.days.forEach((_,di)=>{total++;if(prayed[`${wi}-${di}`])done++;}));
  document.getElementById('progressVal').textContent=`${done} de ${total} oraciones rezadas`;
  document.getElementById('progressFill').style.width=Math.round(done/total*100)+'%';
}

function showCelebration(){
  const week=WEEKS[modalWeek];
  const msgs=['El Cielo ha escuchado tu oración','Tus palabras han llegado a los ángeles','La luz ha recibido tu oración','Gabriel lleva tu oración adelante'];
  document.getElementById('celebrationMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById('celebrationAngel').textContent='— '+week.angel;
  launchParticles();
  const cel=document.getElementById('celebration'); cel.classList.add('active');
  setTimeout(()=>{ cel.style.transition='opacity 0.8s ease'; cel.style.opacity='0'; setTimeout(()=>{ cel.classList.remove('active'); cel.style.opacity=''; cel.style.transition=''; },800); },3500);
}

function launchParticles(){
  const c=document.getElementById('particles'); c.innerHTML=''; c.classList.add('active');
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<40;i++){
    const p=document.createElement('div'), isStar=i%3===0;
    p.className='particle'+(isStar?' star-shape':'');
    const angle=(Math.PI*2/40)*i+(Math.random()-0.5)*0.5, dist=100+Math.random()*250;
    p.style.cssText=`left:${cx}px;top:${cy}px;--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;--pd:${0.6+Math.random()}s;--pdelay:${Math.random()*0.5}s`;
    if(isStar) p.textContent='✦';
    c.appendChild(p);
  }
  setTimeout(()=>{ c.classList.remove('active'); c.innerHTML=''; },2500);
}
</script>
</body>
</html>
