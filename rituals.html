<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#040e08">
<title>Angels Portal — Rituales de Luz</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:        #040e08;
  --bg-mid:    #071408;
  --bg-card:   #091a0c;
  --bg-inner:  #051008;
  --bg-nav:    rgba(4,14,8,0.97);
  --emerald:   #1a7a3c;
  --emerald-lt:#2ea854;
  --emerald-br:#50c878;
  --emerald-pale:#c0f0d0;
  --emerald-dim:rgba(26,122,60,0.22);
  --emerald-glow:rgba(26,122,60,0.08);
  --gold:      #d4a017;
  --gold-lt:   #f0c040;
  --gold-br:   #ffd460;
  --gold-pale: #faedc4;
  --gold-dim:  rgba(212,160,23,0.22);
  --gold-glow: rgba(212,160,23,0.08);
  --text:      #e8f5ee;
  --text-dim:  rgba(232,245,238,0.6);
  --radius-lg: 24px; --radius-md:18px; --radius-sm:14px;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Lora',Georgia,serif;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding-bottom:100px;
}

body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(20,100,40,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(10,80,30,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 40%, rgba(15,90,35,0.08) 0%, transparent 50%);
}

/* Floating leaves/motes */
.motes { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.mote {
  position:absolute; border-radius:50%;
  background:var(--emerald-br);
  animation:mote-float var(--md) ease-in-out infinite var(--mdelay);
  opacity:0;
}
@keyframes mote-float {
  0%   { opacity:0; transform:translateY(0) translateX(0) scale(1); }
  20%  { opacity:var(--mop); }
  80%  { opacity:var(--mop); }
  100% { opacity:0; transform:translateY(-100px) translateX(var(--mx)) scale(0.3); }
}

/* Shimmer */
.shimmer-overlay { position:fixed; inset:0; z-index:998; pointer-events:none; background:radial-gradient(ellipse at center, rgba(26,122,60,0.18) 0%, transparent 70%); opacity:0; transition:opacity 0.4s; }
.shimmer-overlay.active { opacity:1; }

/* Celebration */
.celebration { position:fixed; inset:0; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity 0.5s ease; background:rgba(4,14,8,0.95); }
.celebration.active { opacity:1; pointer-events:all; }
.celebration-ring { width:120px; height:120px; border-radius:50%; border:2px solid var(--emerald); background:var(--bg-inner); display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; box-shadow:0 0 40px rgba(26,122,60,0.3); }
.celebration.active .celebration-ring { animation:ring-expand 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes ring-expand { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
.celebration-ring::before { content:''; position:absolute; inset:-12px; border-radius:50%; border:1px solid var(--emerald-dim); animation:ring-pulse-big 2s ease-in-out infinite; }
.celebration-ring::after  { content:''; position:absolute; inset:-24px; border-radius:50%; border:1px solid rgba(26,122,60,0.08); animation:ring-pulse-big 2s ease-in-out infinite 0.3s; }
@keyframes ring-pulse-big { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:0.1;transform:scale(1.08)} }
.celebration-heard { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-top:32px; margin-bottom:12px; opacity:0; }
.celebration.active .celebration-heard { animation:fade-up-cel 0.5s ease 0.4s forwards; }
.celebration-message { font-family:'Cinzel',serif; font-size:26px; font-weight:600; color:var(--text); text-align:center; line-height:1.4; padding:0 32px; opacity:0; max-width:340px; }
.celebration.active .celebration-message { animation:fade-up-cel 0.5s ease 0.55s forwards; }
.celebration-angel { font-size:16px; color:var(--gold-lt); margin-top:10px; font-style:italic; opacity:0; text-align:center; }
.celebration.active .celebration-angel { animation:fade-up-cel 0.5s ease 0.7s forwards; }
@keyframes fade-up-cel { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.particles { position:fixed; inset:0; pointer-events:none; z-index:501; opacity:0; transition:opacity 0.3s; }
.particles.active { opacity:1; }
.particle { position:absolute; width:4px; height:4px; border-radius:50%; background:var(--gold-br); animation:particle-fly var(--pd) ease-out forwards var(--pdelay); opacity:0; }
.particle.star-shape { width:8px; height:8px; background:none; font-size:12px; display:flex; align-items:center; justify-content:center; }
@keyframes particle-fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0.2)} }

/* Topnav */
.topnav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--gold-dim); }
.back-btn { width:40px; height:40px; border-radius:50%; background:var(--bg-card); border:1px solid var(--gold-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--gold-lt); flex-shrink:0; }
.back-btn:active { transform:scale(0.9); }
.nav-center { flex:1; }
.nav-title { font-family:'Cinzel',serif; font-size:16px; font-weight:600; color:var(--gold-lt); letter-spacing:0.06em; }
.nav-sub { font-size:13px; color:var(--text-dim); margin-top:1px; }

/* Today ritual hero */
.today-hero { position:relative; z-index:5; margin:20px 16px 0; }
.today-card {
  padding:26px 22px 22px;
  border:1px solid rgba(212,160,23,0.3);
  background:linear-gradient(160deg, #0d2a12 0%, #071408 60%, #091a0c 100%);
  border-radius:var(--radius-lg); position:relative; overflow:hidden; cursor:pointer;
  box-shadow:0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,160,23,0.15);
  transition:transform 0.18s;
}
.today-card:active { transform:scale(0.985); }
.today-card::before {
  content:''; position:absolute; top:0; left:5%; right:5%; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-br),transparent); opacity:0.5;
}
/* Soft green glow corner */
.today-card::after {
  content:''; position:absolute; bottom:-40px; right:-40px;
  width:180px; height:180px; border-radius:50%;
  background:radial-gradient(circle, rgba(26,122,60,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.today-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(212,160,23,0.1); border:1px solid rgba(212,160,23,0.25); border-radius:20px; padding:5px 14px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; color:var(--gold-lt); text-transform:uppercase; margin-bottom:14px; }
.today-dot { width:7px; height:7px; border-radius:50%; background:var(--gold-br); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.65)} }
.today-day-num { font-family:'Cinzel',serif; font-size:11px; color:rgba(212,160,23,0.6); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; }
.today-title { font-family:'Cinzel',serif; font-size:22px; font-weight:600; color:var(--gold-pale); letter-spacing:0.02em; line-height:1.3; margin-bottom:8px; }
.today-ritual-label { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--emerald-br); font-style:italic; margin-bottom:18px; }
.today-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:linear-gradient(160deg,#f0c040 0%,#d4a017 50%,#b8860b 100%); color:#1a0f00; font-family:'Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:0.09em; padding:17px; border-radius:14px; border:none; cursor:pointer; box-shadow:0 4px 22px rgba(212,160,23,0.4),0 1px 0 rgba(255,220,100,0.4) inset; transition:transform 0.15s; position:relative; overflow:hidden; }
.today-btn::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:14px 14px 0 0; }
.today-btn:active { transform:scale(0.97); }
.today-btn.done { background:linear-gradient(135deg,#1a6a3a,#0f4424); box-shadow:0 4px 18px rgba(26,106,58,0.4); color:#c0ffd0; }

/* Progress */
.progress-wrap { position:relative; z-index:5; margin:16px 16px 0; }
.progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.progress-lbl { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); }
.progress-val { font-family:'Cinzel',serif; font-size:13px; font-weight:600; color:var(--gold-lt); }
.progress-bar { height:5px; background:var(--bg-inner); border-radius:3px; overflow:hidden; border:1px solid var(--gold-dim); }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-br)); border-radius:3px; transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1); }

/* Section header */
.section-header { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-lt); padding:24px 20px 14px; position:relative; z-index:5; display:flex; align-items:center; gap:10px; }
.section-header::after { content:''; flex:1; height:1px; background:var(--gold-dim); }

/* Ritual cards list */
.rituals-list { display:flex; flex-direction:column; gap:10px; padding:0 16px; position:relative; z-index:5; }

.ritual-card {
  border-radius:var(--radius-lg); border:1px solid var(--gold-dim);
  background:var(--bg-card);
  cursor:pointer; transition:transform 0.18s;
  position:relative; overflow:hidden;
}
.ritual-card:active { transform:scale(0.975); }
.ritual-card.locked { opacity:0.45; cursor:not-allowed; }
.ritual-card.today-card-item { border-color:rgba(212,160,23,0.4); }

/* Accent line top */
.ritual-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--radius-lg) var(--radius-lg) 0 0; background:linear-gradient(90deg,var(--emerald),var(--gold),var(--emerald-br)); opacity:0.6; }
.ritual-card.locked::before { opacity:0.2; }

.ritual-card-inner { display:flex; align-items:center; gap:16px; padding:18px 20px; }

.ritual-num {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:16px; font-weight:700;
  border:1.5px solid var(--gold-dim); color:var(--gold-lt);
  background:var(--bg-inner);
}
.ritual-card.done-card .ritual-num { background:linear-gradient(135deg,var(--gold),var(--gold-br)); border-color:transparent; color:#1a0f00; }
.ritual-card.today-card-item .ritual-num { border-color:var(--gold); color:var(--gold-lt); box-shadow:0 0 0 3px rgba(212,160,23,0.15); }

.ritual-info { flex:1; min-width:0; }
.ritual-day-tag { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.ritual-name { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold-pale); line-height:1.35; margin-bottom:3px; }
.ritual-preview { font-size:13px; color:var(--text-dim); line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }

.ritual-status { font-size:20px; flex-shrink:0; }

/* Ritual modal */
.ritual-modal { position:fixed; inset:0; z-index:200; background:var(--bg); overflow-y:auto; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); }
.ritual-modal.open { transform:translateY(0); }
.ritual-modal::before {
  content:''; position:fixed; top:0; left:0; right:0; height:300px;
  background:radial-gradient(ellipse 80% 60% at 50% -20%, rgba(20,100,40,0.12) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.modal-topnav { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--gold-dim); }
.modal-close { width:40px; height:40px; border-radius:50%; background:var(--bg-card); border:1px solid var(--gold-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--gold-lt); flex-shrink:0; }
.modal-close:active { transform:scale(0.9); }
.modal-title-wrap { flex:1; }
.modal-title { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold-lt); }
.modal-sub { font-size:13px; color:var(--text-dim); margin-top:1px; }
.modal-body { padding:28px 22px; position:relative; z-index:1; }

/* Ritual header in modal */
.modal-ritual-num {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,rgba(26,122,60,0.2),rgba(212,160,23,0.1));
  border:1.5px solid var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:26px; font-weight:700;
  color:var(--gold-lt); margin:0 auto 20px;
  box-shadow:0 0 30px rgba(26,122,60,0.15);
}
.modal-ritual-title { font-family:'Cinzel',serif; font-size:24px; font-weight:600; color:var(--gold-pale); line-height:1.3; margin-bottom:6px; text-align:center; }
.modal-ritual-day { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); text-align:center; margin-bottom:22px; }

/* Ritual section: THE RITUAL */
.modal-section { margin-bottom:24px; }
.modal-section-label {
  display:flex; align-items:center; gap:10px;
  font-family:'Cinzel',serif; font-size:11px; font-weight:600;
  letter-spacing:0.16em; text-transform:uppercase; color:var(--gold);
  margin-bottom:12px;
}
.modal-section-label::after { content:''; flex:1; height:1px; background:var(--gold-dim); }
.modal-ritual-box {
  background:rgba(26,122,60,0.08);
  border:1px solid rgba(26,122,60,0.2);
  border-radius:var(--radius-md);
  padding:16px 18px;
  font-size:16px; color:var(--emerald-pale); line-height:1.7; font-style:italic;
}
.modal-benefits-text { font-size:17px; color:var(--text); line-height:1.95; }
.modal-benefits-text p + p { margin-top:18px; }

.modal-divider { display:flex; align-items:center; gap:10px; margin:20px 0; }
.modal-divider-line { flex:1; height:1px; background:var(--gold-dim); }
.modal-divider-gem { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); opacity:0.6; flex-shrink:0; }

.modal-ornament { text-align:center; padding:20px 0 16px; color:var(--gold-dim); font-size:20px; letter-spacing:12px; }
.modal-actions { display:flex; gap:10px; padding-bottom:40px; }
.modal-done-btn { flex:1; padding:18px; border-radius:16px; border:none; background:linear-gradient(160deg,#f0c040 0%,#d4a017 50%,#b8860b 100%); color:#1a0f00; font-family:'Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:0.08em; cursor:pointer; box-shadow:0 4px 22px rgba(212,160,23,0.4),0 1px 0 rgba(255,220,100,0.4) inset; transition:transform 0.15s; position:relative; overflow:hidden; }
.modal-done-btn::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:16px 16px 0 0; }
.modal-done-btn:active { transform:scale(0.97); }
.modal-done-btn.done { background:linear-gradient(135deg,#1a6a3a,#0f4424); box-shadow:0 4px 18px rgba(26,106,58,0.4); color:#c0ffd0; }
.modal-share-btn { padding:18px 20px; border-radius:16px; border:1px solid var(--gold-dim); background:transparent; color:var(--text-dim); font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.06em; cursor:pointer; }

/* Bottom nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:100; display:flex; background:var(--bg-nav); backdrop-filter:blur(20px); border-top:1px solid var(--gold-dim); padding:8px 0 max(18px,env(safe-area-inset-bottom)); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:10px 0; min-height:56px; justify-content:center; }
.nav-item:active { opacity:0.7; }
.nav-item-icon { font-size:24px; }
.nav-item-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); }
.nav-item.active .nav-item-label { color:var(--gold-lt); font-weight:600; }
.nav-item.active .nav-item-icon { filter:drop-shadow(0 0 8px rgba(212,160,23,0.6)); }
.nav-item.active::after { content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--gold); margin-top:2px; }

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}
</style>
</head>
<body>

<div class="motes" id="motes"></div>
<div class="shimmer-overlay" id="shimmer"></div>

<div class="celebration" id="celebration">
  <div class="celebration-ring">🌿</div>
  <div class="celebration-heard">El ritual está completo</div>
  <div class="celebration-message" id="celebrationMsg">Gabriel ha sido testigo de tu ofrenda</div>
  <div class="celebration-angel" id="celebrationAngel">— Arcángel Gabriel</div>
</div>
<div class="particles" id="particles"></div>

<!-- Ritual modal -->
<div class="ritual-modal" id="ritualModal">
  <div class="modal-topnav">
    <div class="modal-close" onclick="closeModal()">✕</div>

      <div class="modal-section-label">El Ritual</div>
      <div class="modal-ritual-box" id="modalRitualBox">—</div>

      <div class="modal-section-label">Los Beneficios</div>

<!-- Topnav -->

</div>

<!-- Today -->
<div class="today-hero">
  <div class="today-card" onclick="openTodayRitual()">
    <div class="today-badge"><div class="today-dot"></div> Ritual de Hoy</div>
    <div class="today-day-num" id="todayDayNum">Day 1</div>
    <div class="today-title" id="todayTitle">—</div>
    <div class="today-ritual-label" id="todayRitualLabel">🌿 —</div>
    <button class="today-btn" id="todayBtn">🌿 Comenzar el Ritual de Hoy</button>
  </div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-row"><div class="progress-lbl">Jornada de 15 días</div><div class="progress-val" id="progressVal">0 / 15 rituales</div></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- All rituals -->
<div class="section-header">Todos los Rituales</div>
<div class="rituals-list" id="ritualsList"></div>
<div style="height:24px"></div>

<!-- Bottom nav -->
<div class="bottom-nav">

  <div class="nav-item" onclick="window.location.href='chat.html'"><div class="nav-item-icon">💬</div><div class="nav-item-label">Chat</div></div>
  <div class="nav-item" onclick="window.location.href='journey.html'"><div class="nav-item-icon">🔥</div><div class="nav-item-label">Camino</div></div>
  <div class="nav-item" onclick="window.location.href='prayers.html'"><div class="nav-item-icon">🕯️</div><div class="nav-item-label">Oraciones</div></div>
</div>

<script>
const RITUALS = [
  { num:1, name:`El Sello de Sal Gruesa y Agua`, ritual:`Coloca un vaso de agua con dos cucharadas de sal gruesa detrás de la puerta de entrada principal.`, benefits:`El beneficio principal de este ritual es la creación de un filtro de entrada para tu hogar. En la tradición bíblica, la sal es un elemento de purificación y preservación que aleja la corrupción. Espiritualmente, actúa como un pararrayos para las energías de la envidia o el mal de ojo, impidiendo que estas vibraciones pesadas entren en tu espacio de vida.\n\nMás allá de la protección espiritual, este gesto diario ayuda a calmar la ansiedad de quienes viven en la casa. Al ver el vaso allí, el subconsciente comprende que existe una barrera de protección activa, lo que genera una sensación inmediata de alivio y seguridad emocional.` },
  { num:2, name:`Ventilación y el Aliento de Vida`, ritual:`Abre todas las ventanas por la mañana e invoca el Aliento de Gabriel.`, benefits:`El acto de abrir tu hogar al aire fresco simboliza la renovación de las promesas divinas en tu vida. El beneficio espiritual aquí es la expulsión de la energía estancada — esa sensación de pesadez o desánimo que la envidia suele dejar a su paso. El Arcángel Gabriel usa este flujo para barrer los chismes y las palabras negativas dirigidas contra tu hogar.\n\nPsicológicamente, la entrada de luz solar y aire fresco aumenta la producción de serotonina y mejora el estado de ánimo de todos los residentes. Un ambiente bien ventilado e iluminado es el opuesto natural de la envidia, que prefiere lo oculto y las sombras.` },
  { num:3, name:`Unción de Entradas con Aceite de Oliva`, ritual:`Haz una pequeña cruz con aceite de oliva en la parte superior de cada marco de puerta.`, benefits:`Este ritual aporta el beneficio de la consagración total de tu espacio a Dios. El aceite de oliva es un símbolo bíblico del Espíritu Santo y de la unción que protege a los elegidos. Al ungir las entradas, estableces una frontera espiritual invisible pero poderosa que funciona como sello de propiedad divina.\n\nPara la familia, el beneficio es una sensación de estar protegida. Este gesto consagra no solo las puertas físicas, sino también las puertas espirituales de quienes viven allí, fortaleciendo su resiliencia emocional frente a las críticas externas.` },
  { num:4, name:`La Autoridad del Salmo 91`, ritual:`Mantén una Biblia abierta en el Salmo 91 en un lugar central de la casa.`, benefits:`El mayor beneficio de este ritual es el establecimiento de una atmósfera de autoridad. El Salmo 91 es conocido como la oración definitiva de protección contra trampas y plagas. Mantener la Palabra abierta funciona como un anclaje visual de la presencia de los ángeles, creando un ambiente donde la envidia simplemente no puede sostenerse.\n\nAdemás, la visión diaria del texto sagrado ofrece un beneficio cognitivo de calma y enfoque. En momentos de crisis, contemplar las promesas de protección divina reafirma la fe y reduce drásticamente el estrés — un recordatorio constante de que no estás luchando solo.` },
  { num:5, name:`Limpieza con Romero — La Alegría de Gabriel`, ritual:`Limpia los muebles o suelos con agua infusionada de romero.`, benefits:`El romero aporta el beneficio de la limpieza vibracional a través de la alegría. La envidia es una energía de codicia y tristeza; muere donde existe la satisfacción. El romero en la tradición cristiana es la hierba que trae aliento y claridad mental. Al limpiar la casa con esta esencia, eliminas las manchas espirituales dejadas por visitantes no deseados.\n\nEl beneficio terapéutico del aroma del romero también es enorme: estimula la memoria y la concentración, despejando el cansancio mental causado por la carga negativa de los demás. Transforma la limpieza del hogar en un ritual de autocuidado y renovación espiritual.` },
  { num:6, name:`El Enfoque de la Vela Blanca`, ritual:`Enciende una vela blanca en un lugar seguro para orar.`, benefits:`El beneficio central de la vela blanca es la transmutación de la oscuridad en luz. La llama representa la presencia de Cristo y la pureza del Arcángel Gabriel. Al encenderla, creas un punto focal de limpieza, ayudando a quemar los pensamientos negativos y las formas mentales de envidia que flotan en el ambiente.\n\nEmocionalmente, el ritual de la vela ayuda en la meditación y la reducción de la ansiedad. El acto de observar la llama calma el ritmo cardíaco e invita al silencio interior, permitiéndote escuchar mejor tu intuición y los mensajes de Gabriel.` },
  { num:7, name:`Desechando lo Estancado`, ritual:`Tira los objetos rotos o en desuso.`, benefits:`El beneficio aquí es la liberación del flujo de abundancia. Los objetos rotos son como agujeros en el campo energético de la casa, donde la energía de la escasez queda atrapada. Al desechar lo que ya no te sirve, le señalas al Arcángel Gabriel que estás listo para lo nuevo — generando un beneficio espiritual inmediato de ligereza y apertura.\n\nA nivel mental, el desapego material reduce el peso psicológico del desorden. Una casa libre de desorden refleja una mente clara y decidida, fortaleciendo al individuo frente a la envidia al enfocarse en el crecimiento y la renovación.` },
  { num:8, name:`Frecuencia Sonora de Adoración`, ritual:`Pon música instrumental suave o himnos en las habitaciones.`, benefits:`El beneficio espiritual del sonido es la armonización del ambiente. La música de adoración actúa como la Trompeta de Gabriel, derribando muros de negatividad. El sonido eleva la vibración de cada átomo de la casa, creando una barrera de frecuencia que la envidia no puede penetrar — un escudo invisible que mantiene la paz incluso cuando el mundo exterior está en caos.\n\nSocialmente, la música suave reduce los conflictos y mejora la comunicación entre los miembros de la familia, creando un hogar más tranquilo donde la paciencia florece. Es una herramienta de protección pasiva: la activas y continúa trabajando mientras realizas tus tareas diarias.` },
  { num:9, name:`El Escudo de Lirios Blancos`, ritual:`Mantén flores blancas frescas en la entrada de la casa.`, benefits:`Las flores blancas, especialmente los lirios, son símbolos de la pureza de Gabriel y aportan el beneficio del filtrado orgánico. Actúan como centinelas vivientes que absorben tensiones y miradas pesadas antes de que lleguen a las personas del interior, funcionando como transmutadores naturales de energía que protegen y embellecen el ambiente.\n\nPsicológicamente, la presencia de flores vivas mejora el bienestar y reduce los sentimientos de depresión o aislamiento. Ver flores al entrar a la casa crea un disparador de gratitud y frescura, neutralizando cualquier amargura traída desde la calle.` },
  { num:10, name:`Visualización del Círculo de Luz`, ritual:`Cierra los ojos y visualiza un círculo de luz blanca rodeando la casa.`, benefits:`El beneficio de esta práctica es el fortalecimiento del poder mental y la fe consciente. Al visualizar el círculo de protección de Gabriel, ejerces tu autoridad espiritual sobre tu territorio, creando un campo de fuerza psíquico que repele los ataques energéticos y la envidia.\n\nMentalmente, esta práctica reduce el miedo y los sentimientos de victimismo. Dejas de ser alguien que es objeto de envidia y te conviertes en alguien protegido por la luz — ganando empoderamiento personal y paz mental.` },
  { num:11, name:`Baño de Purificación Personal`, ritual:`Vierte un té de lavanda desde el cuello hacia abajo después de ducharte.`, benefits:`El beneficio aquí es la limpieza de tu aura o campo energético personal. A menudo, la envidia no está en la casa sino adherida a la persona después de un día de trabajo. La lavanda limpia estos residuos energéticos y la fatiga acumulada, restaurando el equilibrio emocional y preparando el cuerpo para el descanso regenerador.\n\nEl beneficio físico es la mejora de la calidad del sueño y la relajación muscular. Al quitarte el peso de los hombros energéticamente, evitas que la envidia se convierta en enfermedades psicosomáticas — un ritual de higiene espiritual que garantiza que no llevas los problemas del mundo a tu cama.` },
  { num:12, name:`Liberación por el Fuego`, ritual:`Escribe lo que te angustia y quema el papel de forma segura.`, benefits:`El beneficio es la catarsis emocional y la entrega total a Dios. Al escribir tus miedos o las situaciones donde sientes que la envidia actúa en tu contra, llevas el problema del subconsciente al consciente. Al quemar el papel, simbolizas que el problema ya no tiene poder sobre ti.\n\nEsto genera un alivio psicológico inmediato, funcionando como un voto de confianza en la justicia divina. El beneficio es el fin del ciclo de obsesionarse con lo que piensan los demás — te sientes libre para enfocarte en ti mismo, dejando el juicio en manos de los ángeles.` },
  { num:13, name:`El Sello de las Ventanas`, ritual:`Toca las esquinas de las ventanas con una gota de agua, pidiendo protección.`, benefits:`El beneficio de este ritual es el cierre de portales de vulnerabilidad. Las ventanas representan nuestra conexión con el mundo y cómo el mundo nos ve. Sellarlas espiritualmente con la intercesión de Gabriel evita que las flechas espirituales de la envidia entren mientras eres vulnerable o estás durmiendo.\n\nPara la mente, esto aporta el beneficio de la privacidad y la reflexión, creando una sensación de puerto seguro donde te sientes cómodo siendo tú mismo sin miedo al juicio externo. Es un ritual de límites que enseña al individuo a proteger su intimidad.` },
  { num:14, name:`El Incienso de las Oraciones`, ritual:`Quema mirra o incienso mientras caminas por la casa.`, benefits:`El beneficio es la elevación de la frecuencia espiritual a través del aroma y el simbolismo bíblico. El incienso representa las oraciones que suben al cielo bajo la guardia de Gabriel. El humo actúa como un agente purificador en el aire, dispersando los restos de energía negativa impregnados en las paredes después de una discusión o una visita envidiosa.\n\nAdemás, las resinas de mirra e incienso tienen propiedades antisépticas y relajantes, purificando el ambiente tanto física como espiritualmente. Es una manera de invitar a lo sagrado a impregnar cada rincón de tu morada, convirtiéndola en un templo de paz.` },
  { num:15, name:`El Festín de la Gratitud`, ritual:`Prepara una comida especial, agradeciendo a Dios por todo lo que tienes.`, benefits:`El beneficio de este ritual es el sello dorado contra la envidia. La gratitud es la única energía que la envidia no puede soportar, porque la gratitud reconoce la abundancia mientras la envidia se centra en la carencia. Al celebrar lo que ya tienes, sellas tu vida con una frecuencia de plenitud que atrae aún más bendiciones.\n\nEl beneficio familiar es el fortalecimiento de los vínculos. Una comida preparada con gratitud nutre tanto el cuerpo como el alma, generando recuerdos positivos que sirven como combustible emocional para los días difíciles. Este ritual final consolida todos los demás, transformando la protección en un estilo de vida alegre bajo la luz del Arcángel Gabriel.` },
  { num:16, name:`La Afirmación de la Estrella Matutina`, ritual:`Mira hacia el este al amanecer y pronuncia en voz alta tres declaraciones de protección divina y gratitud.`, benefits:`La mañana es el umbral entre la noche y el día — la hora en que la primera luz cruza la tierra. Al dirigirte hacia el este y pronunciar palabras de afirmación en este tiempo sagrado, alineas tu voz con la frecuencia de la renovación. La palabra hablada en esta hora tiene un peso enorme, porque lo que declaras al inicio del día tiende a moldear todo su arco. Cada declaración actúa como un pacto entre tu alma y el cielo.\n\nLas rutinas matutinas intencionales reducen las hormonas del estrés y aumentan el sentido de agencia. Al comenzar con gratitud expresada en voz alta, entrenas la mente para notar evidencias de protección durante todo el día, construyendo una resiliencia que te sostiene incluso en la dificultad. Lo que comienza como una práctica deliberada se convierte, con el tiempo, en el primer idioma natural de tu corazón.` },
  { num:17, name:`El Jardín del Corazón`, ritual:`Riega una planta viva y pronuncia una bendición sobre ella como símbolo de tu propio crecimiento interior.`, benefits:`Se cree que el Arcángel Rafael, sanador y sustentador de los seres vivos, se mueve a través de toda vida verde y creciente. Cuando cuidas una planta con intención consciente, participas en el ritmo de la creación — un recordatorio de que todas las cosas crecen a su propio ritmo y bajo las condiciones adecuadas. Bendecir la planta como un espejo de tu alma invita la energía sanadora de Rafael a tu vida cotidiana.\n\nLa terapia hortícola muestra que cuidar plantas vivas reduce significativamente la ansiedad y la depresión. El acto de nutrir algo fuera de ti mismo crea propósito y conexión. Al vincular esto a la intención espiritual, multiplicas su beneficio — convirtiéndote tanto en cuidador como en receptor de la gracia. La planta crece; tú también.` },
  { num:18, name:`El Diario Sagrado`, ritual:`Antes de dormir, escribe tres cosas específicas que el cielo te proporcionó hoy, por pequeñas que sean.`, benefits:`El registro escrito de la provisión divina es una de las prácticas espirituales más antiguas, evidente a lo largo de las escrituras hebreas donde Dios ordenó la construcción de altares para conmemorar sus actos. Al escribir tres dones específicos del día, entrenas tu percepción espiritual para rastrear evidencias de gracia en lugar de carencias, debilitando el dominio del miedo y la envidia en tu vida interior.\n\nLa neurociencia confirma que el diario de gratitud antes de dormir activa el sistema nervioso parasimpático, mejorando la calidad del sueño y reduciendo la rumiación. Con el tiempo, esta práctica reconfigura el pensamiento predeterminado de la mente hacia la abundancia. El diario se convierte en un testimonio — un documento al que puedes volver en épocas más oscuras como prueba de que siempre has sido provisto.` },
  { num:19, name:`La Oración Descalza en la Tierra`, ritual:`Párate descalzo/a en tierra natural durante cinco minutos y ofrece una oración silenciosa de arraigo.`, benefits:`La tierra es el fundamento sobre el cual los ángeles posan sus pies cuando descienden. Estar descalzo sobre hierba o suelo es un acto físico de humildad — un reconocimiento de que somos criaturas de la tierra que se extienden hacia el cielo. Esta conexión arraiga el exceso de energía espiritual o emocional y crea una quietud que facilita la recepción de la guía divina.\n\nSe ha demostrado que la práctica del arraigo reduce la inflamación y los niveles de cortisol al permitir que el cuerpo se equilibre con la carga natural de la tierra. Espiritual y físicamente, este ritual restaura el equilibrio. Quienes se sienten crónicamente ansiosos o dispersos a menudo descubren que cinco minutos de oración descalza resetean todo su sistema nervioso, produciendo una calma que permanece durante horas.` },
  { num:20, name:`El Espejo de Luz`, ritual:`Párate frente a un espejo, mírate a los ojos y di en voz alta: 'Soy un hijo/a amado/a del cielo.'`, benefits:`El ritual del espejo conlleva el beneficio espiritual de confrontar al yo con la verdad en lugar de la acusación. Muchos de nosotros llevamos dentro una voz interna severa formada por años de críticas o decepciones. Al pararte frente a tu propio reflejo y pronunciar palabras de amabilidad divina, vas reemplazando gradualmente esa voz por una sagrada — comenzando a verte como Dios te ve: digno de amor y protección.\n\nSe ha demostrado que las afirmaciones frente al espejo reducen la vergüenza y mejoran la autocompasión — cualidades que fortalecen directamente la inmunidad emocional contra el daño de la envidia o el juicio de los demás. Lo que crees sobre ti mismo se convierte en el lente a través del cual interpretas todos los eventos. Este ritual desplaza lentamente ese lente de la autocondenación a la gracia, una mañana a la vez.` },
  { num:21, name:`La Copa de la Ofrenda`, ritual:`Llena una taza limpia con agua fresca, sostenla con ambas manos y ofrécela al cielo como símbolo de confianza.`, benefits:`El agua es el símbolo más antiguo de la presencia divina y la purificación en las tradiciones espirituales. Al ofrecer una taza de agua — un acto de hospitalidad extendido hacia lo invisible — cultivas la confianza, señalando al reino espiritual que estás abierto, receptivo y dispuesto a ser llenado. Este ritual es un acto de generosidad espiritual que invita a la bendición recíproca a tu hogar y tu vida.\n\nEl simple gesto de sostener algo con ambas manos y ofrecerlo hacia arriba también tiene un efecto de arraigo inmediato en el sistema nervioso. Interrumpe los ciclos de ansiedad y autosuficiencia, creando una rendición momentánea que es profundamente calmante. Con el tiempo, esta práctica construye un reflejo de confianza — de modo que cuando surge la dificultad, el primer impulso se convierte en ofrenda en lugar de aferramiento.` },
  { num:22, name:`El Río del Aliento`, ritual:`Siéntate en quietud durante cinco minutos: inhala durante cuatro tiempos, mantén durante cuatro, exhala durante cuatro.`, benefits:`La respiración es el puente más directo entre el cuerpo físico y el espiritual. El Arcángel Gabriel, cuyo nombre significa 'Dios es mi fuerza', está asociado con el aliento del anuncio — el momento en que comienza la vida. Al practicar una respiración consciente y rítmica, invitas esta energía de renovación a las cámaras más profundas de tu ser, limpiando lo que la respiración ansiosa o superficial ha comprimido.\n\nLa respiración controlada activa el nervio vago y reduce el cortisol casi instantáneamente. Cinco minutos de trabajo respiratorio intencional tienen efectos mensurables sobre la presión arterial, la claridad mental y la regulación emocional. Como práctica espiritual, se convierte en una forma de oración sin palabras — una conversación silenciosa entre tu cuerpo y el cielo sobre la naturaleza de la confianza.` },
  { num:23, name:`El Camino del Perdón`, ritual:`Escribe el nombre de alguien difícil de perdonar, dobla el papel y colócalo bajo una piedra con una oración por su paz.`, benefits:`La falta de perdón es una de las energías más pesadas que una persona puede cargar, y atrae consistentemente más de lo que contiene — conflicto, amargura y estancamiento espiritual. Al nombrar a la persona y colocar físicamente el peso sobre el papel, externalizas la carga y la transfieres simbólicamente a algo fuera de ti mismo. La oración por su paz es el punto de inflexión: el momento en que eliges la liberación sobre la represalia.\n\nLa investigación sobre el perdón muestra constantemente que soltar el resentimiento mejora la función inmune, reduce la presión arterial y disminuye el dolor crónico. Espiritualmente, el perdón despeja el canal por el que fluyen las bendiciones. No es debilidad sino una forma de fuerza extraordinaria — el acto de negarse a dejar que la ofensa de otra persona se convierta en tu morada permanente.` },
  { num:24, name:`La Guardia Nocturna`, ritual:`Antes de dormir, repasa el día en voz alta y entrega verbalmente cada momento al cuidado de Dios.`, benefits:`La guardia nocturna es la versión espiritual de cerrar las cuentas del día. En lugar de llevar ansiedades no resueltas al sueño, este ritual las ofrece hacia arriba — confiando en que la inteligencia divina puede trabajar en las situaciones mientras descansas. Se cree que el Arcángel Miguel, guardián de las horas nocturnas, monta guardia sobre quienes conscientemente entregan sus preocupaciones antes de dormir.\n\nLa práctica nocturna de revisión y liberación reduce drásticamente la activación cognitiva que retrasa el sueño. Cuando la mente recibe una oportunidad estructurada para procesar el día, no necesita hacerlo compulsivamente a las 2am. El resultado es un sueño más profundo, sueños más instructivos y la sensación de despertar cada mañana con una página en blanco en lugar de los capítulos inacabados de ayer.` },
  { num:25, name:`El Toque Sanador`, ritual:`Pon una gota de aceite de oliva en tus palmas, frótalas y coloca ambas manos sobre tu corazón durante un minuto.`, benefits:`Las manos son instrumentos de sanación en prácticamente todas las tradiciones sagradas. Al ungirlas con aceite y colocarlas sobre el corazón — el centro tanto de la vida física como de la experiencia emocional — realizas un rito de sanación personal que invoca la presencia restauradora del Arcángel Rafael. El corazón, tan frecuentemente el lugar de viejas heridas, recibe este acto gentil como un reconocimiento: lo ves, lo cuidas y pides su sanación.\n\nEl toque de autocompasión activa la respuesta de oxitocina del cuerpo, reduciendo los sentimientos de aislamiento y el dolor emocional. El calor de tus propias manos sobre el corazón envía una señal calmante al sistema nervioso. Con el tiempo, esta práctica diaria crea una memoria somática de ternura hacia uno mismo — un lenguaje físico de gracia que tu cuerpo comienza a asociar con la seguridad y la pertenencia.` },
  { num:26, name:`El Silencio de la Hora Sagrada`, ritual:`Elige una hora sin interrupciones cada semana para sentarte en completo silencio — sin pantallas, sin música, sin conversación.`, benefits:`En el silencio, la voz del cielo se vuelve audible. El Arcángel Gabriel es el mensajero — pero sus mensajes requieren cierta quietud para ser recibidos. La práctica del silencio intencional crea un espacio interior lo suficientemente grande para que la guía aterrice. Lo que llega en el silencio es a menudo la claridad que cien horas activas no pudieron producir: un sentido de dirección, la disolución de la falsa urgencia, el recuerdo de lo que verdaderamente importa.\n\nLa neurociencia moderna confirma que el silencio regenera neuronas en el hipocampo — el área responsable de la memoria, el aprendizaje y la regulación emocional. En un mundo diseñado para la estimulación constante, el silencio elegido se convierte en un acto radical de autopreservación. Sales de él más integrado, más decidido y más en paz que cuando entraste.` },
  { num:27, name:`La Bendición de los Umbrales`, ritual:`Cada vez que pases por un umbral, haz una pausa de un aliento y susurra una oración de protección por lo que viene.`, benefits:`Las puertas y los umbrales son portales simbólicos entre una realidad y la siguiente — entre lo privado y lo público, lo conocido y lo desconocido. Al hacer una pausa en cada uno con una palabra de oración, transformas cada transición de tu día en un momento sagrado. Esta práctica invita la protección del Arcángel Miguel a cada nuevo espacio que entras, sellándote en luz divina antes de enfrentar lo que te espera.\n\nEl beneficio psicológico de este ritual de micro-pausa es la interrupción de la reactividad. La mayoría de los momentos estresantes se afrontan demasiado rápido, sin perspectiva. Al hacer una breve pausa en cada umbral, creas espacio entre el estímulo y la respuesta — el mismo espacio donde vive la sabiduría. Con el tiempo, este reflejo de bendición disuelve el hábito de apresurarse y lo reemplaza con la tranquila autoridad de la presencia.` },
  { num:28, name:`La Piedra del Recuerdo`, ritual:`Sostén una piedra lisa en tu palma y di en voz alta un recuerdo de un momento en que fuiste divinamente cuidado/a.`, benefits:`Las piedras se han utilizado desde los primeros días de la historia espiritual registrada como memoriales — marcadores de los momentos en que el cielo tocó la tierra. Al sostener una piedra y vocalizar un testimonio específico de provisión o protección, arraigan tu fe en algo concreto y recordado en lugar de abstracto y esperado. Esto desplaza el centro de gravedad de tu vida espiritual del miedo al futuro a la gratitud por el pasado.\n\nVerbalizar recuerdos positivos fortalece su codificación neural, haciéndolos más accesibles en tiempos de duda o dificultad. Cuando el miedo dice 'esta vez es diferente', la práctica del recuerdo responde: 'pero he sido sostenido antes'. La piedra se convierte en un ancla — un objeto físico cargado de testimonio que puedes volver a sostener cada vez que sube la marea de la incertidumbre.` },
  { num:29, name:`El Velo de las Estrellas`, ritual:`Sal afuera después del anochecer, mira hacia el cielo y nombra en voz alta al menos cinco bendiciones en tu vida.`, benefits:`El cielo nocturno ha movido a los seres humanos hacia el asombro, la oración y la perspectiva desde el principio de los tiempos. Al adentrarte en él deliberadamente y nombrar tus bendiciones bajo las estrellas, te ubicas dentro del marco de referencia más amplio posible — uno que hace pequeñas las ansiedades cotidianas e inmensa la provisión divina. Se dice que los ángeles se mueven entre las estrellas, y nombrar tu gratitud en voz alta es una forma de enviarla hacia arriba a través de la bóveda abierta del cielo.\n\nEl asombro — la emoción que el cielo nocturno desencadena de manera más confiable — ha demostrado reducir los marcadores inflamatorios, aumentar el comportamiento prosocial y expandir el sentido del tiempo. Incluso dos minutos bajo las estrellas, nombrando bendiciones en voz alta, pueden cambiar todo el registro de una noche difícil. El universo se convierte no en una extensión indiferente sino en testigo de tu gratitud y tu devenir.` },
  { num:30, name:`La Renovación del Pacto`, ritual:`Escribe una intención sincera para los días que vienen y coloca el papel bajo tu almohada por la noche.`, benefits:`El acto de escribir una única intención clara es más poderoso que una larga lista de resoluciones, porque te obliga a discernir lo que más importa. Al reducir tu esperanza a una sola oración, involucras tanto la mente racional como la intuitiva en la alineación espiritual. Colocar el papel bajo tu almohada es un acto de entrega — ofreciendo tu intención al cielo durante las horas de sueño, cuando el yo más profundo es más receptivo a la guía.\n\nEl establecimiento de intenciones combinado con el sueño amplifica el compromiso con los objetivos, probablemente porque la consolidación de la memoria durante el sueño fortalece las vías neuronales asociadas con el comportamiento motivado. Espiritualmente, la renovación del pacto cierra cada temporada con un acto de agencia y esperanza — una declaración de que no estás meramente sobreviviendo sino participando conscientemente en la vida que estás construyendo, bajo la guía y protección del cielo. Amén.` },
]

const cloudRituals = JSON.parse(localStorage.getItem('ap_rituals_cloud')||
  localStorage.getItem('ap_rituals')||'{}');
// ap_rituals é salvo no login com dados do Supabase — usar como fonte de verdade
let done = Object.assign({}, localRituals); 
const USER_EMAIL_R = localStorage.getItem('ap_email') || '';

// Sincroniza rituals_done com Supabase em background
function syncRitualsToCloud() {
  if (!USER_EMAIL_R) return;
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: USER_EMAIL_R, rituals_done: done })
  }).catch(e => console.error('Sync rituals error:', e));
}
let modalIdx = 0;

// Day 1-indexed from join date real do cadastro
function getJoinDate() {
  const raw = localStorage.getItem('ap_joined');
  if (!raw) return new Date(); // sem data = dia 1
  const d = new Date(raw);
  return isNaN(d.getTime()) ? new Date() : d;
}
function getDayNum() { return Math.max(1, Math.min(Math.floor((new Date()-getJoinDate())/86400000)+1, 30)); }
function formatDate(d) { return d.toLocaleDateString('es-ES',{month:'long',day:'numeric'}); }

window.addEventListener('load',()=>{
  buildMotes(); buildTodayHero(); buildList(); updateProgress();
});

function buildMotes(){
  const el=document.getElementById('motes');
  for(let i=0;i<18;i++){
    const m=document.createElement('div');
    const sz=Math.random()<0.3?3:Math.random()<0.6?2:1;
    m.className='mote';
    m.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${5+Math.random()*20}%;--md:${4+Math.random()*5}s;--mdelay:${Math.random()*5}s;--mop:${0.2+Math.random()*0.4};--mx:${(Math.random()-0.5)*40}px`;
    el.appendChild(m);
  }
}

function buildTodayHero(){
  const day=getDayNum(), r=RITUALS[day-1];
  const isDone=done[day-1];
  document.getElementById('todayDayNum').textContent=`Día ${day} de 30`;
  document.getElementById('todayTitle').textContent=r.name;
  document.getElementById('todayRitualLabel').textContent=`🌿 ${r.ritual.substring(0,60)}...`;
  document.getElementById('navSub').textContent=`Día ${day} · ${formatDate(new Date())}`;
  const btn=document.getElementById('todayBtn');
  if(isDone){btn.textContent='✦ Ritual completado hoy';btn.classList.add('done');}
}

function buildList(){
  const day=getDayNum(), list=document.getElementById('ritualsList');
  list.innerHTML='';
  RITUALS.forEach((r,i)=>{
    const isToday=i===day-1, isLocked=i>day-1, isDone=done[i];
    const dd=new Date(getJoinDate()); dd.setDate(getJoinDate().getDate()+i);
    const card=document.createElement('div');
    card.className='ritual-card'+(isDone?' done-card':'')+(isToday?' today-card-item':'')+(isLocked?' locked':'');
    card.innerHTML=`
      <div class="ritual-card-inner">
        <div class="ritual-num">${isDone?'✦':r.num}</div>
        <div class="ritual-info">
          <div class="ritual-day-tag">${isToday?'📍 Hoy · ':''}${formatDate(dd)}</div>
          <div class="ritual-name">${r.name}</div>
          <div class="ritual-preview">${r.ritual}</div>
        </div>
        <div class="ritual-status">${isDone?'✅':isToday?'🌿':isLocked?'🔒':'›'}</div>
      </div>`;
    if(!isLocked) card.onclick=()=>openRitual(i);
    list.appendChild(card);
  });
}

function openTodayRitual(){ openRitual(getDayNum()-1); }

function openRitual(idx){
  const r=RITUALS[idx]; const isDone=done[idx];
  modalIdx=idx;
  const dd=new Date(getJoinDate()); dd.setDate(getJoinDate().getDate()+idx);
  document.getElementById('modalNum').textContent=r.num;
  document.getElementById('modalTitle').textContent=r.name;
  document.getElementById('modalSub').textContent=`Día ${idx+1} · ${formatDate(dd)}`;
  document.getElementById('modalRitualTitle').textContent=r.name;
  document.getElementById('modalRitualDay').textContent=`Día ${idx+1} · Limpieza y Protección`;
  document.getElementById('modalRitualBox').textContent=r.ritual;
  document.getElementById('modalBenefits').innerHTML=r.benefits.split('\n\n').map(p=>`<p>${p}</p>`).join('');
  const btn=document.getElementById('modalDoneBtn');
  if(isDone){btn.textContent='✦ Ritual completado';btn.classList.add('done');}
  else{btn.textContent='🌿 He completado este ritual';btn.classList.remove('done');}
  document.getElementById('ritualModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){ document.getElementById('ritualModal').classList.remove('open'); document.body.style.overflow=''; }

function markDone(){
  if(done[modalIdx])return;
  done[modalIdx]=true; localStorage.setItem('ap_rituals',JSON.stringify(done));
  syncRitualsToCloud();
  const btn=document.getElementById('modalDoneBtn');
  btn.textContent='✦ Ritual completado'; btn.classList.add('done');
  showCelebration();
  setTimeout(()=>{ buildTodayHero(); buildList(); updateProgress(); },500);
}

function updateProgress(){
  const d=Object.keys(done).length;
  document.getElementById('progressVal').textContent=`${d} / 30 rituales`;
  document.getElementById('progressFill').style.width=Math.round(d/30*100)+'%';
}

function showCelebration(){
  const msgs=['Gabriel ha sido testigo de tu ofrenda','El ritual está sellado con luz divina','Tu acto de fe ha sido recibido','Los ángeles han bendecido este momento'];
  document.getElementById('celebrationMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  launchParticles();
  const cel=document.getElementById('celebration'); cel.classList.add('active');
  setTimeout(()=>{ cel.style.transition='opacity 0.8s ease'; cel.style.opacity='0'; setTimeout(()=>{ cel.classList.remove('active'); cel.style.opacity=''; cel.style.transition=''; },800); },3500);
}

function launchParticles(){
  const c=document.getElementById('particles'); c.innerHTML=''; c.classList.add('active');
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<40;i++){
    const p=document.createElement('div'), isStar=i%3===0;
    p.className='particle'+(isStar?' star-shape':'');
    const angle=(Math.PI*2/40)*i+(Math.random()-0.5)*0.5, dist=100+Math.random()*250;
    p.style.cssText=`left:${cx}px;top:${cy}px;--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;--pd:${0.6+Math.random()}s;--pdelay:${Math.random()*0.5}s`;
    if(isStar) p.textContent='✦';
    c.appendChild(p);
  }
  setTimeout(()=>{ c.classList.remove('active'); c.innerHTML=''; },2500);
}
</script>
</body>
