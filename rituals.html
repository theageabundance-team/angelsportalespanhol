<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#040e08">
<title>Angels Portal — Rituals of Light</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:        #040e08;
  --bg-mid:    #071408;
  --bg-card:   #091a0c;
  --bg-inner:  #051008;
  --bg-nav:    rgba(4,14,8,0.97);
  --emerald:   #1a7a3c;
  --emerald-lt:#2ea854;
  --emerald-br:#50c878;
  --emerald-pale:#c0f0d0;
  --emerald-dim:rgba(26,122,60,0.22);
  --emerald-glow:rgba(26,122,60,0.08);
  --gold:      #d4a017;
  --gold-lt:   #f0c040;
  --gold-br:   #ffd460;
  --gold-pale: #faedc4;
  --gold-dim:  rgba(212,160,23,0.22);
  --gold-glow: rgba(212,160,23,0.08);
  --text:      #e8f5ee;
  --text-dim:  rgba(232,245,238,0.6);
  --radius-lg: 24px; --radius-md:18px; --radius-sm:14px;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Lora',Georgia,serif;
  min-height:100dvh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding-bottom:100px;
}

body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(20,100,40,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 10% 80%, rgba(10,80,30,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 40%, rgba(15,90,35,0.08) 0%, transparent 50%);
}

/* Floating leaves/motes */
.motes { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.mote {
  position:absolute; border-radius:50%;
  background:var(--emerald-br);
  animation:mote-float var(--md) ease-in-out infinite var(--mdelay);
  opacity:0;
}
@keyframes mote-float {
  0%   { opacity:0; transform:translateY(0) translateX(0) scale(1); }
  20%  { opacity:var(--mop); }
  80%  { opacity:var(--mop); }
  100% { opacity:0; transform:translateY(-100px) translateX(var(--mx)) scale(0.3); }
}

/* Shimmer */
.shimmer-overlay { position:fixed; inset:0; z-index:998; pointer-events:none; background:radial-gradient(ellipse at center, rgba(26,122,60,0.18) 0%, transparent 70%); opacity:0; transition:opacity 0.4s; }
.shimmer-overlay.active { opacity:1; }

/* Celebration */
.celebration { position:fixed; inset:0; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; opacity:0; transition:opacity 0.5s ease; background:rgba(4,14,8,0.95); }
.celebration.active { opacity:1; pointer-events:all; }
.celebration-ring { width:120px; height:120px; border-radius:50%; border:2px solid var(--emerald); background:var(--bg-inner); display:flex; align-items:center; justify-content:center; font-size:48px; position:relative; box-shadow:0 0 40px rgba(26,122,60,0.3); }
.celebration.active .celebration-ring { animation:ring-expand 0.6s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes ring-expand { from{transform:scale(0.3);opacity:0} to{transform:scale(1);opacity:1} }
.celebration-ring::before { content:''; position:absolute; inset:-12px; border-radius:50%; border:1px solid var(--emerald-dim); animation:ring-pulse-big 2s ease-in-out infinite; }
.celebration-ring::after  { content:''; position:absolute; inset:-24px; border-radius:50%; border:1px solid rgba(26,122,60,0.08); animation:ring-pulse-big 2s ease-in-out infinite 0.3s; }
@keyframes ring-pulse-big { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:0.1;transform:scale(1.08)} }
.celebration-heard { font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); margin-top:32px; margin-bottom:12px; opacity:0; }
.celebration.active .celebration-heard { animation:fade-up-cel 0.5s ease 0.4s forwards; }
.celebration-message { font-family:'Cinzel',serif; font-size:26px; font-weight:600; color:var(--text); text-align:center; line-height:1.4; padding:0 32px; opacity:0; max-width:340px; }
.celebration.active .celebration-message { animation:fade-up-cel 0.5s ease 0.55s forwards; }
.celebration-angel { font-size:16px; color:var(--gold-lt); margin-top:10px; font-style:italic; opacity:0; text-align:center; }
.celebration.active .celebration-angel { animation:fade-up-cel 0.5s ease 0.7s forwards; }
@keyframes fade-up-cel { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.particles { position:fixed; inset:0; pointer-events:none; z-index:501; opacity:0; transition:opacity 0.3s; }
.particles.active { opacity:1; }
.particle { position:absolute; width:4px; height:4px; border-radius:50%; background:var(--gold-br); animation:particle-fly var(--pd) ease-out forwards var(--pdelay); opacity:0; }
.particle.star-shape { width:8px; height:8px; background:none; font-size:12px; display:flex; align-items:center; justify-content:center; }
@keyframes particle-fly { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--px),var(--py)) scale(0.2)} }

/* Topnav */
.topnav { position:sticky; top:0; z-index:100; display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--gold-dim); }
.back-btn { width:40px; height:40px; border-radius:50%; background:var(--bg-card); border:1px solid var(--gold-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--gold-lt); flex-shrink:0; }
.back-btn:active { transform:scale(0.9); }
.nav-center { flex:1; }
.nav-title { font-family:'Cinzel',serif; font-size:16px; font-weight:600; color:var(--gold-lt); letter-spacing:0.06em; }
.nav-sub { font-size:13px; color:var(--text-dim); margin-top:1px; }

/* Today ritual hero */
.today-hero { position:relative; z-index:5; margin:20px 16px 0; }
.today-card {
  padding:26px 22px 22px;
  border:1px solid rgba(212,160,23,0.3);
  background:linear-gradient(160deg, #0d2a12 0%, #071408 60%, #091a0c 100%);
  border-radius:var(--radius-lg); position:relative; overflow:hidden; cursor:pointer;
  box-shadow:0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(212,160,23,0.15);
  transition:transform 0.18s;
}
.today-card:active { transform:scale(0.985); }
.today-card::before {
  content:''; position:absolute; top:0; left:5%; right:5%; height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-br),transparent); opacity:0.5;
}
/* Soft green glow corner */
.today-card::after {
  content:''; position:absolute; bottom:-40px; right:-40px;
  width:180px; height:180px; border-radius:50%;
  background:radial-gradient(circle, rgba(26,122,60,0.12) 0%, transparent 70%);
  pointer-events:none;
}
.today-badge { display:inline-flex; align-items:center; gap:7px; background:rgba(212,160,23,0.1); border:1px solid rgba(212,160,23,0.25); border-radius:20px; padding:5px 14px; font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; color:var(--gold-lt); text-transform:uppercase; margin-bottom:14px; }
.today-dot { width:7px; height:7px; border-radius:50%; background:var(--gold-br); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.65)} }
.today-day-num { font-family:'Cinzel',serif; font-size:11px; color:rgba(212,160,23,0.6); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:6px; }
.today-title { font-family:'Cinzel',serif; font-size:22px; font-weight:600; color:var(--gold-pale); letter-spacing:0.02em; line-height:1.3; margin-bottom:8px; }
.today-ritual-label { display:inline-flex; align-items:center; gap:6px; font-size:14px; color:var(--emerald-br); font-style:italic; margin-bottom:18px; }
.today-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; background:linear-gradient(160deg,#f0c040 0%,#d4a017 50%,#b8860b 100%); color:#1a0f00; font-family:'Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:0.09em; padding:17px; border-radius:14px; border:none; cursor:pointer; box-shadow:0 4px 22px rgba(212,160,23,0.4),0 1px 0 rgba(255,220,100,0.4) inset; transition:transform 0.15s; position:relative; overflow:hidden; }
.today-btn::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:14px 14px 0 0; }
.today-btn:active { transform:scale(0.97); }
.today-btn.done { background:linear-gradient(135deg,#1a6a3a,#0f4424); box-shadow:0 4px 18px rgba(26,106,58,0.4); color:#c0ffd0; }

/* Progress */
.progress-wrap { position:relative; z-index:5; margin:16px 16px 0; }
.progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.progress-lbl { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); }
.progress-val { font-family:'Cinzel',serif; font-size:13px; font-weight:600; color:var(--gold-lt); }
.progress-bar { height:5px; background:var(--bg-inner); border-radius:3px; overflow:hidden; border:1px solid var(--gold-dim); }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-br)); border-radius:3px; transition:width 0.7s cubic-bezier(0.34,1.56,0.64,1); }

/* Section header */
.section-header { font-family:'Cinzel',serif; font-size:11px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold-lt); padding:24px 20px 14px; position:relative; z-index:5; display:flex; align-items:center; gap:10px; }
.section-header::after { content:''; flex:1; height:1px; background:var(--gold-dim); }

/* Ritual cards list */
.rituals-list { display:flex; flex-direction:column; gap:10px; padding:0 16px; position:relative; z-index:5; }

.ritual-card {
  border-radius:var(--radius-lg); border:1px solid var(--gold-dim);
  background:var(--bg-card);
  cursor:pointer; transition:transform 0.18s;
  position:relative; overflow:hidden;
}
.ritual-card:active { transform:scale(0.975); }
.ritual-card.locked { opacity:0.45; cursor:not-allowed; }
.ritual-card.today-card-item { border-color:rgba(212,160,23,0.4); }

/* Accent line top */
.ritual-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; border-radius:var(--radius-lg) var(--radius-lg) 0 0; background:linear-gradient(90deg,var(--emerald),var(--gold),var(--emerald-br)); opacity:0.6; }
.ritual-card.locked::before { opacity:0.2; }

.ritual-card-inner { display:flex; align-items:center; gap:16px; padding:18px 20px; }

.ritual-num {
  width:48px; height:48px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:16px; font-weight:700;
  border:1.5px solid var(--gold-dim); color:var(--gold-lt);
  background:var(--bg-inner);
}
.ritual-card.done-card .ritual-num { background:linear-gradient(135deg,var(--gold),var(--gold-br)); border-color:transparent; color:#1a0f00; }
.ritual-card.today-card-item .ritual-num { border-color:var(--gold); color:var(--gold-lt); box-shadow:0 0 0 3px rgba(212,160,23,0.15); }

.ritual-info { flex:1; min-width:0; }
.ritual-day-tag { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.ritual-name { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold-pale); line-height:1.35; margin-bottom:3px; }
.ritual-preview { font-size:13px; color:var(--text-dim); line-height:1.5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }

.ritual-status { font-size:20px; flex-shrink:0; }

/* Ritual modal */
.ritual-modal { position:fixed; inset:0; z-index:200; background:var(--bg); overflow-y:auto; transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.16,1,0.3,1); }
.ritual-modal.open { transform:translateY(0); }
.ritual-modal::before {
  content:''; position:fixed; top:0; left:0; right:0; height:300px;
  background:radial-gradient(ellipse 80% 60% at 50% -20%, rgba(20,100,40,0.12) 0%, transparent 70%);
  pointer-events:none; z-index:0;
}
.modal-topnav { position:sticky; top:0; z-index:10; display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--gold-dim); }
.modal-close { width:40px; height:40px; border-radius:50%; background:var(--bg-card); border:1px solid var(--gold-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:20px; color:var(--gold-lt); flex-shrink:0; }
.modal-close:active { transform:scale(0.9); }
.modal-title-wrap { flex:1; }
.modal-title { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold-lt); }
.modal-sub { font-size:13px; color:var(--text-dim); margin-top:1px; }
.modal-body { padding:28px 22px; position:relative; z-index:1; }

/* Ritual header in modal */
.modal-ritual-num {
  width:72px; height:72px; border-radius:50%;
  background:linear-gradient(135deg,rgba(26,122,60,0.2),rgba(212,160,23,0.1));
  border:1.5px solid var(--gold-dim);
  display:flex; align-items:center; justify-content:center;
  font-family:'Cinzel',serif; font-size:26px; font-weight:700;
  color:var(--gold-lt); margin:0 auto 20px;
  box-shadow:0 0 30px rgba(26,122,60,0.15);
}
.modal-ritual-title { font-family:'Cinzel',serif; font-size:24px; font-weight:600; color:var(--gold-pale); line-height:1.3; margin-bottom:6px; text-align:center; }
.modal-ritual-day { font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); text-align:center; margin-bottom:22px; }

/* Ritual section: THE RITUAL */
.modal-section { margin-bottom:24px; }
.modal-section-label {
  display:flex; align-items:center; gap:10px;
  font-family:'Cinzel',serif; font-size:11px; font-weight:600;
  letter-spacing:0.16em; text-transform:uppercase; color:var(--gold);
  margin-bottom:12px;
}
.modal-section-label::after { content:''; flex:1; height:1px; background:var(--gold-dim); }
.modal-ritual-box {
  background:rgba(26,122,60,0.08);
  border:1px solid rgba(26,122,60,0.2);
  border-radius:var(--radius-md);
  padding:16px 18px;
  font-size:16px; color:var(--emerald-pale); line-height:1.7; font-style:italic;
}
.modal-benefits-text { font-size:17px; color:var(--text); line-height:1.95; }
.modal-benefits-text p + p { margin-top:18px; }

.modal-divider { display:flex; align-items:center; gap:10px; margin:20px 0; }
.modal-divider-line { flex:1; height:1px; background:var(--gold-dim); }
.modal-divider-gem { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); opacity:0.6; flex-shrink:0; }

.modal-ornament { text-align:center; padding:20px 0 16px; color:var(--gold-dim); font-size:20px; letter-spacing:12px; }
.modal-actions { display:flex; gap:10px; padding-bottom:40px; }
.modal-done-btn { flex:1; padding:18px; border-radius:16px; border:none; background:linear-gradient(160deg,#f0c040 0%,#d4a017 50%,#b8860b 100%); color:#1a0f00; font-family:'Cinzel',serif; font-size:15px; font-weight:700; letter-spacing:0.08em; cursor:pointer; box-shadow:0 4px 22px rgba(212,160,23,0.4),0 1px 0 rgba(255,220,100,0.4) inset; transition:transform 0.15s; position:relative; overflow:hidden; }
.modal-done-btn::after { content:''; position:absolute; top:0; left:0; right:0; height:50%; background:rgba(255,255,255,0.08); border-radius:16px 16px 0 0; }
.modal-done-btn:active { transform:scale(0.97); }
.modal-done-btn.done { background:linear-gradient(135deg,#1a6a3a,#0f4424); box-shadow:0 4px 18px rgba(26,106,58,0.4); color:#c0ffd0; }
.modal-share-btn { padding:18px 20px; border-radius:16px; border:1px solid var(--gold-dim); background:transparent; color:var(--text-dim); font-family:'Cinzel',serif; font-size:13px; letter-spacing:0.06em; cursor:pointer; }

/* Bottom nav */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:100; display:flex; background:var(--bg-nav); backdrop-filter:blur(20px); border-top:1px solid var(--gold-dim); padding:8px 0 max(18px,env(safe-area-inset-bottom)); }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:10px 0; min-height:56px; justify-content:center; }
.nav-item:active { opacity:0.7; }
.nav-item-icon { font-size:24px; }
.nav-item-label { font-family:'Cinzel',serif; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-dim); }
.nav-item.active .nav-item-label { color:var(--gold-lt); font-weight:600; }
.nav-item.active .nav-item-icon { filter:drop-shadow(0 0 8px rgba(212,160,23,0.6)); }
.nav-item.active::after { content:''; display:block; width:4px; height:4px; border-radius:50%; background:var(--gold); margin-top:2px; }

::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:4px}
</style>
</head>
<body>

<div class="motes" id="motes"></div>
<div class="shimmer-overlay" id="shimmer"></div>

<div class="celebration" id="celebration">
  <div class="celebration-ring">🌿</div>
  <div class="celebration-heard">The ritual is complete</div>
  <div class="celebration-message" id="celebrationMsg">Gabriel has witnessed your offering</div>
  <div class="celebration-angel" id="celebrationAngel">— Archangel Gabriel</div>
</div>
<div class="particles" id="particles"></div>

<!-- Ritual modal -->
<div class="ritual-modal" id="ritualModal">
  <div class="modal-topnav">
    <div class="modal-close" onclick="closeModal()">✕</div>
    <div class="modal-title-wrap">
      <div class="modal-title" id="modalTitle">—</div>
      <div class="modal-sub" id="modalSub">—</div>
    </div>
  </div>
  <div class="modal-body">
    <div class="modal-ritual-num" id="modalNum">1</div>
    <div class="modal-ritual-title" id="modalRitualTitle">—</div>
    <div class="modal-ritual-day" id="modalRitualDay">—</div>
    <div class="modal-section">
      <div class="modal-section-label">The Ritual</div>
      <div class="modal-ritual-box" id="modalRitualBox">—</div>
    </div>
    <div class="modal-divider"><div class="modal-divider-line"></div><div class="modal-divider-gem"></div><div class="modal-divider-line"></div></div>
    <div class="modal-section">
      <div class="modal-section-label">The Benefits</div>
      <div class="modal-benefits-text" id="modalBenefits"></div>
    </div>
    <div class="modal-ornament">✦ · ✦ · ✦</div>
    <div class="modal-actions">
      <button class="modal-done-btn" id="modalDoneBtn" onclick="markDone()">🌿 I have completed this ritual</button>
      <button class="modal-share-btn">↑ Share</button>
    </div>
  </div>
</div>

<!-- Topnav -->
<div class="topnav">
  <div class="back-btn" onclick="window.location.href='index.html'">‹</div>
  <div class="nav-center">
    <div class="nav-title">Rituals of Light</div>
    <div class="nav-sub" id="navSub">Cleansing & Protection</div>
  </div>
</div>

<!-- Today -->
<div class="today-hero">
  <div class="today-card" onclick="openTodayRitual()">
    <div class="today-badge"><div class="today-dot"></div> Today's Ritual</div>
    <div class="today-day-num" id="todayDayNum">Day 1</div>
    <div class="today-title" id="todayTitle">—</div>
    <div class="today-ritual-label" id="todayRitualLabel">🌿 —</div>
    <button class="today-btn" id="todayBtn">🌿 Begin Today's Ritual</button>
  </div>
</div>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-row"><div class="progress-lbl">15-day journey</div><div class="progress-val" id="progressVal">0 / 15 rituals</div></div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<!-- All rituals -->
<div class="section-header">All Rituals</div>
<div class="rituals-list" id="ritualsList"></div>
<div style="height:24px"></div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'"><div class="nav-item-icon">🏛️</div><div class="nav-item-label">Home</div></div>
  <div class="nav-item" onclick="window.location.href='chat.html'"><div class="nav-item-icon">💬</div><div class="nav-item-label">Chat</div></div>
  <div class="nav-item" onclick="window.location.href='journey.html'"><div class="nav-item-icon">🔥</div><div class="nav-item-label">Journey</div></div>
  <div class="nav-item" onclick="window.location.href='prayers.html'"><div class="nav-item-icon">🕯️</div><div class="nav-item-label">Prayers</div></div>
</div>

<script>
const RITUALS = [
  { num:1, name:`The Seal of Coarse Salt and Water`, ritual:`Place a glass of water with two tablespoons of coarse salt behind the main entrance door.`, benefits:`The primary benefit of this ritual is the creation of an entry filter for your home. In biblical tradition, salt is an element of purification and preservation that wards off corruption. Spiritually, it acts as a lightning rod for energies of envy or the evil eye, preventing these heavy vibrations from entering your living space.\n\nBeyond the spiritual protection, this daily gesture helps calm the anxiety of those living in the house. By seeing the glass there, the subconscious understands that an active protection barrier exists, which generates an immediate sense of relief and emotional security.` },
  { num:2, name:`Ventilation and the Breath of Life`, ritual:`Open all windows in the morning and invoke the Breath of Gabriel.`, benefits:`The act of opening your home to fresh air symbolizes the renewal of divine promises in your life. The spiritual benefit here is the expulsion of stagnant energy — that feeling of heaviness or discouragement that envy often leaves in its wake. Archangel Gabriel uses this flow to sweep away gossip and negative words cast against your home.\n\nPsychologically, the entry of sunlight and fresh air increases serotonin production and improves the mood of all residents. A well-ventilated and bright environment is the natural opposite of envy, which prefers the hidden and the shadows.` },
  { num:3, name:`Anointing Entrances with Olive Oil`, ritual:`Make a small cross with olive oil at the top of every door frame.`, benefits:`This ritual brings the benefit of total consecration of your space to God. Olive oil is a biblical symbol of the Holy Spirit and the anointing that protects the chosen. By anointing the entrances, you establish an invisible but powerful spiritual frontier that functions as a seal of divine ownership.\n\nFor the family, the benefit is a feeling of being shielded. This gesture consecrates not only the physical doors but also the spiritual doors of those who live there, strengthening their emotional resilience against external criticism.` },
  { num:4, name:`The Authority of Psalm 91`, ritual:`Keep a Bible open to Psalm 91 in a central location of the house.`, benefits:`The greatest benefit of this ritual is the establishment of an atmosphere of authority. Psalm 91 is known as the ultimate prayer of protection against snares and plagues. Keeping the Word open functions as a visual anchoring of the presence of angels, creating an environment where envy simply cannot sustain itself.\n\nAdditionally, the daily sight of the sacred text offers a cognitive benefit of calm and focus. In moments of crisis, looking at the promises of divine protection reaffirms faith and drastically reduces stress — a constant reminder that you are not fighting alone.` },
  { num:5, name:`Rosemary Cleansing — Gabriel's Joy`, ritual:`Wipe furniture or floors with rosemary-infused water.`, benefits:`Rosemary brings the benefit of vibrational cleansing through joy. Envy is an energy of greed and sadness; it dies where contentment exists. Rosemary in Christian tradition is the herb that brings encouragement and mental clarity. By cleaning the house with this essence, you remove the spiritual stains left by unwelcome visitors.\n\nThe therapeutic benefit of the rosemary scent is also enormous: it stimulates memory and concentration, clearing the mental fatigue caused by the negative charge of others. It transforms house cleaning into a ritual of self-care and spiritual renewal.` },
  { num:6, name:`The Focus of the White Candle`, ritual:`Light a white candle in a safe place for prayer.`, benefits:`The central benefit of the white candle is the transmutation of darkness into light. The flame represents the presence of Christ and the purity of Archangel Gabriel. By lighting it, you create a focal point for cleansing, helping to burn away negative thoughts and thought-forms of envy floating in the environment.\n\nEmotionally, the candle ritual aids in meditation and anxiety reduction. The act of observing the flame calms the heart rate and invites inner silence, allowing you to better hear your intuition and Gabriel's messages.` },
  { num:7, name:`Discarding the Stagnant`, ritual:`Throw away broken or unused objects.`, benefits:`The benefit here is the release of the flow of abundance. Broken objects are like holes in the energy field of the house, where the energy of scarcity gets trapped. By discarding what no longer serves you, you signal to Archangel Gabriel that you are ready for the new — generating an immediate spiritual benefit of lightness and openness.\n\nOn a mental level, material detachment reduces the psychological weight of disorganization. A house free of clutter reflects a clear and decisive mind, strengthening the individual against envy by focusing on growth and renewal.` },
  { num:8, name:`Sound Frequency of Adoration`, ritual:`Play soft instrumental music or hymns in the rooms.`, benefits:`The spiritual benefit of sound is the harmonization of the environment. Worship music acts as Gabriel's Trumpet, tearing down walls of negativity. Sound raises the vibration of every atom in the house, creating a frequency barrier that envy cannot penetrate — an invisible shield that maintains peace even when the outside world is in chaos.\n\nSocially, soft music reduces conflict and improves communication among family members, creating a quieter home where patience flourishes. It is a passive protection tool: you activate it, and it continues working while you go about your daily tasks.` },
  { num:9, name:`The Shield of White Lilies`, ritual:`Keep fresh white flowers at the entrance of the house.`, benefits:`White flowers, especially lilies, are symbols of Gabriel's purity and bring the benefit of organic filtering. They act as living sentinels that absorb tensions and heavy gazes before they reach the people inside, acting as a natural energy transmuter that both protects and beautifies the environment.\n\nPsychologically, the presence of living flowers improves well-being and reduces feelings of depression or isolation. Seeing flowers upon entering the house creates a trigger for gratitude and freshness, neutralizing any bitterness brought in from the street.` },
  { num:10, name:`Visualization of the Circle of Light`, ritual:`Close your eyes and visualize a circle of white light surrounding the house.`, benefits:`The benefit of this practice is the strengthening of mental power and conscious faith. By visualizing Gabriel's protection circle, you are exercising your spiritual authority over your territory, creating a psychic force field that repels energetic attacks and envy.\n\nMentally, this practice reduces fear and feelings of victimhood. You stop being someone who is a target of envy and become someone protected by the light — gaining personal empowerment and peace of mind.` },
  { num:11, name:`Personal Purification Bath`, ritual:`Pour a lavender tea from the neck down after your shower.`, benefits:`The benefit here is the cleansing of your aura or personal energy field. Often, envy is not in the house but stuck to the person after a day of work. Lavender cleanses these energetic residues and accumulated fatigue, restoring emotional balance and preparing the body for regenerative rest.\n\nThe physical benefit is improved sleep quality and muscle relaxation. By taking the weight off your shoulders energetically, you prevent envy from turning into psychosomatic illnesses — a ritual of spiritual hygiene ensuring you do not bring the world's problems into your bed.` },
  { num:12, name:`Liberation by Fire`, ritual:`Write down what distresses you and safely burn the paper.`, benefits:`The benefit is emotional catharsis and total surrender to God. By writing down your fears or the situations where you feel envy acting against you, you bring the problem from the subconscious to the conscious. By burning the paper, you symbolize that the problem no longer has power over you.\n\nThis generates immediate psychological relief, functioning as a vote of confidence in divine justice. The benefit is the end of the cycle of obsessing over what others think — you feel free to focus on yourself, leaving judgment in the hands of the angels.` },
  { num:13, name:`The Seal of the Windows`, ritual:`Touch the corners of the windows with a drop of water, asking for protection.`, benefits:`The benefit of this ritual is the closing of portals of vulnerability. Windows represent our connection with the world and how the world sees us. Spiritually sealing them with Gabriel's intercession prevents spiritual arrows of envy from entering while you are vulnerable or sleeping.\n\nFor the mind, this brings the benefit of privacy and reflection, creating a sense of a safe harbor where you feel comfortable being yourself without fear of external judgment. It is a ritual of boundaries that teaches the individual to protect their intimacy.` },
  { num:14, name:`The Incense of Prayers`, ritual:`Burn myrrh or frankincense while walking through the house.`, benefits:`The benefit is the elevation of spiritual frequency through scent and biblical symbolism. Incense represents prayers rising to heaven under Gabriel's guard. The smoke acts as an airborne cleansing agent, dispersing remnants of negative energy impregnated in the walls after an argument or an envious visitor.\n\nFurthermore, myrrh and frankincense resins have antiseptic and relaxing properties, purifying the environment both physically and spiritually. It is a way of inviting the sacred to permeate every inch of your dwelling, making it a temple of peace.` },
  { num:15, name:`The Gratitude Feast`, ritual:`Prepare a special meal, thanking God for everything you have.`, benefits:`The benefit of this ritual is the golden seal against envy. Gratitude is the only energy that envy cannot withstand, because gratitude recognizes abundance while envy focuses on lack. By celebrating what you already have, you seal your life with a frequency of fullness that attracts even more blessings.\n\nThe family benefit is the strengthening of bonds. A meal made with gratitude nourishes both body and soul, generating positive memories that serve as emotional fuel for difficult days. This final ritual consolidates all others, transforming protection into a joyful lifestyle under the light of Archangel Gabriel.` },
  { num:16, name:`The Morning Star Affirmation`, ritual:`Face east at sunrise and speak aloud three declarations of divine protection and gratitude.`, benefits:`The morning is the threshold between night and day — the hour when the first light crosses the earth. By turning toward the east and speaking words of affirmation at this sacred time, you align your voice with the frequency of renewal. The spoken word at this hour carries enormous weight, because what you declare at the start of a day tends to shape its entire arc. Each declaration acts as a covenant between your soul and heaven.\n\nIntentional morning routines reduce stress hormones and increase a sense of agency. By beginning with gratitude spoken aloud, you train the mind to notice evidence of protection throughout the day, building a resilience that carries you even through difficulty. What starts as a deliberate practice becomes, over time, the natural first language of your heart.` },
  { num:17, name:`The Garden of the Heart`, ritual:`Water a living plant and speak a blessing over it as a symbol of your own inner growth.`, benefits:`Archangel Raphael, healer and sustainer of living things, is believed to move through all green and growing life. When you tend to a plant with conscious intention, you participate in the rhythm of creation — a reminder that all things grow at their own pace and under the right conditions. Blessing the plant as a mirror of your soul invites the healing energy of Raphael into your daily life.\n\nHorticulture therapy shows that caring for living plants significantly reduces anxiety and depression. The act of nurturing something outside yourself creates purpose and connection. By linking this to spiritual intention, you multiply its benefit — becoming both caretaker and recipient of grace. The plant grows; so do you.` },
  { num:18, name:`The Sacred Journal`, ritual:`Before bed, write three specific things heaven provided for you today, no matter how small.`, benefits:`The written record of divine provision is one of the oldest spiritual practices, evident throughout the Hebrew scriptures where God commanded the building of altars to commemorate his acts. By writing three specific gifts from the day, you train your spiritual perception to track evidence of grace rather than lack, weakening the hold of fear and envy on your inner life.\n\nNeuroscience confirms that gratitude journaling before sleep activates the parasympathetic nervous system, improving sleep quality and reducing rumination. Over time, this practice rewires the default thinking of the mind toward abundance. The journal becomes a testimony — a document you can return to in darker seasons as proof that you have always been provided for.` },
  { num:19, name:`The Barefoot Earth Prayer`, ritual:`Stand barefoot on natural ground for five minutes and offer a silent prayer of rootedness.`, benefits:`The earth is the foundation upon which the angels place their feet when they descend. Standing barefoot on grass or soil is a physical act of humility — an acknowledgment that we are creatures of the ground who reach toward heaven. This connection grounds excess spiritual or emotional energy and creates a stillness that makes it easier to receive divine guidance.\n\nThe practice of grounding has been shown to reduce inflammation and cortisol levels by allowing the body to equilibrate with the earth's natural charge. Spiritually and physically, this ritual restores balance. Those who feel chronically anxious or scattered often find that five minutes of barefoot prayer resets their entire nervous system, producing a calm that remains for hours afterward.` },
  { num:20, name:`The Mirror of Light`, ritual:`Stand before a mirror, look yourself in the eyes, and speak aloud: 'I am a beloved child of heaven.'`, benefits:`The mirror ritual carries the spiritual benefit of confronting the self with truth rather than accusation. Many of us carry within us a harsh internal voice formed by years of criticism or disappointment. By standing before your own reflection and speaking words of divine belovedness, you gradually replace that voice with a sacred one — beginning to see yourself as God sees you: worthy of love and protection.\n\nMirror affirmations have been shown to reduce shame and improve self-compassion — qualities that directly strengthen emotional immunity against the harm of others' envy or judgment. What you believe about yourself becomes the lens through which you interpret all events. This ritual slowly shifts that lens from self-condemnation to grace, one morning at a time.` },
  { num:21, name:`The Cup of Offering`, ritual:`Fill a clean cup with fresh water, hold it in both hands, and offer it to heaven as a symbol of trust.`, benefits:`Water is the most ancient symbol of divine presence and purification across spiritual traditions. By offering a cup of water — an act of hospitality extended toward the unseen — you cultivate trust, signaling to the spirit realm that you are open, receptive, and willing to be filled. This ritual is an act of spiritual generosity that invites reciprocal blessing into your home and life.\n\nThe simple gesture of holding something in both hands and offering it upward also has an immediate grounding effect on the nervous system. It interrupts cycles of anxiety and self-reliance, creating a momentary surrender that is deeply calming. Over time, this practice builds a reflex of trust — so that when difficulty arises, the first impulse becomes offering rather than grasping.` },
  { num:22, name:`The River of Breath`, ritual:`Sit in stillness for five minutes: breathe in for four counts, hold for four, release for four.`, benefits:`The breath is the most direct bridge between the physical and the spiritual body. Archangel Gabriel, whose name means 'God is my strength,' is associated with the breath of announcement — the moment when life begins. By practicing conscious, rhythmic breathing, you invite this energy of renewal into the deepest chambers of your being, cleansing what anxious or shallow breathing has compressed.\n\nControlled breathing activates the vagus nerve and reduces cortisol almost instantly. Five minutes of intentional breath work has measurable effects on blood pressure, mental clarity, and emotional regulation. As a spiritual practice, it becomes a form of prayer without words — a silent conversation between your body and heaven about the nature of trust.` },
  { num:23, name:`The Path of Forgiveness`, ritual:`Write the name of someone difficult to forgive, fold the paper, and place it under a stone with a prayer for their peace.`, benefits:`Unforgiveness is one of the heaviest energies a person can carry, and it consistently attracts more of what it holds — conflict, bitterness, and spiritual stagnation. By naming the person and physically placing the weight upon the paper, you externalize the burden and symbolically transfer it to something outside yourself. The prayer for their peace is the pivot point: the moment where you choose release over retaliation.\n\nResearch on forgiveness consistently shows that releasing resentment improves immune function, reduces blood pressure, and decreases chronic pain. Spiritually, forgiveness clears the channel through which blessings flow. It is not weakness but a form of extraordinary strength — the act of refusing to let another person's offense become your permanent dwelling place.` },
  { num:24, name:`The Night Watch`, ritual:`Before sleep, review the day aloud and verbally surrender each moment to God's care.`, benefits:`The night watch is the spiritual version of closing the accounts of the day. Rather than carrying unresolved anxieties into sleep, this ritual offers them upward — trusting that divine intelligence can work through situations while you rest. Archangel Michael, guardian of the night hours, is believed to stand watch over those who consciously surrender their cares before sleeping.\n\nThe nightly review and release practice dramatically reduces the cognitive arousal that delays sleep. When the mind is given a structured opportunity to process the day, it does not need to do so compulsively at 2am. The result is deeper sleep, more instructive dreams, and a sense of waking each morning with a fresh page rather than yesterday's unfinished chapters.` },
  { num:25, name:`The Healing Touch`, ritual:`Place a drop of olive oil on your palms, rub them together, and lay both hands over your heart for one minute.`, benefits:`The hands are instruments of healing in virtually every sacred tradition. By anointing them with oil and placing them over the heart — the center of both physical life and emotional experience — you enact a personal healing rite that calls on Archangel Raphael's restorative presence. The heart, so often the site of old wounds, receives this gentle act as an acknowledgment: you see it, you tend to it, and you ask for its healing.\n\nSelf-compassion touch activates the body's oxytocin response, reducing feelings of isolation and emotional pain. The warmth of your own hands over the heart sends a calming signal to the nervous system. Over time, this daily practice creates a somatic memory of self-tenderness — a physical language of grace that your body begins to associate with safety and belonging.` },
  { num:26, name:`The Silence of the Sacred Hour`, ritual:`Choose one uninterrupted hour each week to sit in complete silence — no screens, no music, no conversation.`, benefits:`In the silence, the voice of heaven becomes audible. Archangel Gabriel is the messenger — but his messages require a certain stillness to be received. The practice of intentional silence creates an interior space large enough for guidance to land. What arrives in the silence is often the clarity that a hundred active hours could not produce: a sense of direction, the dissolving of false urgency, the remembrance of what truly matters.\n\nModern neuroscience confirms that silence regenerates neurons in the hippocampus — the area responsible for memory, learning, and emotional regulation. In a world designed for constant stimulation, chosen silence becomes a radical act of self-preservation. You emerge from it more integrated, more decisive, and more at peace than when you entered.` },
  { num:27, name:`The Blessing of Thresholds`, ritual:`Each time you pass through a doorway, pause for one breath and whisper a prayer of protection for what lies ahead.`, benefits:`Doorways and thresholds are symbolic portals between one reality and the next — between the private and the public, the known and the unknown. By pausing at each one with a word of prayer, you transform every transition in your day into a sacred moment. This practice invites Archangel Michael's protection into each new space you enter, sealing you in divine light before you face what awaits.\n\nThe psychological benefit of this micro-pause ritual is the interruption of reactivity. Most stressful moments are entered too fast, without perspective. By briefly pausing at each threshold, you create space between stimulus and response — the same space where wisdom lives. Over time, this reflex of blessing dissolves the habit of rushing and replaces it with the quiet authority of presence.` },
  { num:28, name:`The Stone of Remembrance`, ritual:`Hold a smooth stone in your palm and speak aloud one memory of a time you were divinely cared for.`, benefits:`Stones have been used since the earliest days of recorded spiritual history as memorials — markers of the moments when heaven touched earth. By holding a stone and vocalizing a specific testimony of provision or protection, you root your faith in something concrete and remembered rather than abstract and hoped-for. This shifts the center of gravity in your spiritual life from fear of the future to gratitude for the past.\n\nVerbalizing positive memories strengthens their neural encoding, making them more accessible during times of doubt or difficulty. When fear says 'this time is different,' the practice of remembrance answers: 'but I have been sustained before.' The stone becomes an anchor — a physical object charged with testimony that you can hold again whenever the tide of uncertainty rises.` },
  { num:29, name:`The Veil of Stars`, ritual:`Step outside after dark, look up at the sky, and name aloud at least five blessings in your life.`, benefits:`The night sky has moved human beings to awe, prayer, and perspective since the beginning of time. By stepping into it deliberately and naming your blessings under the stars, you place yourself within the largest possible frame of reference — one that makes daily anxieties small and divine provision immense. The angels are said to move between the stars, and naming your gratitude aloud is a way of sending it upward through the open vault of heaven.\n\nAwe — the emotion most reliably triggered by the night sky — has been shown to reduce inflammatory markers, increase prosocial behavior, and expand one's sense of time. Even two minutes under the stars, naming blessings aloud, can shift the entire register of a difficult evening. The universe becomes not an indifferent expanse but a witness to your gratitude and your becoming.` },
  { num:30, name:`The Covenant Renewal`, ritual:`Write one sincere intention for the days ahead and place the paper under your pillow for the night.`, benefits:`The act of writing a single clear intention is more powerful than a long list of resolutions, because it forces you to discern what matters most. By reducing your hope to one sentence, you engage both the rational and intuitive mind in spiritual alignment. Placing the paper under your pillow is an act of surrender — offering your intention to heaven during the hours of sleep, when the deeper self is most receptive to guidance.\n\nIntention-setting combined with sleep amplifies commitment to goals, likely because memory consolidation during sleep strengthens the neural pathways associated with motivated behavior. Spiritually, the covenant renewal closes each season with an act of agency and hope — a declaration that you are not merely surviving but participating consciously in the life you are building, under the guidance and protection of heaven. Amen.` },
]

// Mescla progresso local com o do Supabase (ap_rituals vem do login)
const localRituals = JSON.parse(localStorage.getItem('ap_rituals')||'{}');
const cloudRituals = JSON.parse(localStorage.getItem('ap_rituals_cloud')||
  localStorage.getItem('ap_rituals')||'{}');
// ap_rituals é salvo no login com dados do Supabase — usar como fonte de verdade
let done = Object.assign({}, localRituals); 
const USER_EMAIL_R = localStorage.getItem('ap_email') || '';

// Sincroniza rituals_done com Supabase em background
function syncRitualsToCloud() {
  if (!USER_EMAIL_R) return;
  fetch('/api/progress', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: USER_EMAIL_R, rituals_done: done })
  }).catch(e => console.error('Sync rituals error:', e));
}
let modalIdx = 0;

// Day 1-indexed from join date real do cadastro
function getJoinDate() {
  const raw = localStorage.getItem('ap_joined');
  if (!raw) return new Date(); // sem data = dia 1
  const d = new Date(raw);
  return isNaN(d.getTime()) ? new Date() : d;
}
function getDayNum() { return Math.max(1, Math.min(Math.floor((new Date()-getJoinDate())/86400000)+1, 30)); }
function formatDate(d) { return d.toLocaleDateString('en-US',{month:'long',day:'numeric'}); }

window.addEventListener('load',()=>{
  buildMotes(); buildTodayHero(); buildList(); updateProgress();
});

function buildMotes(){
  const el=document.getElementById('motes');
  for(let i=0;i<18;i++){
    const m=document.createElement('div');
    const sz=Math.random()<0.3?3:Math.random()<0.6?2:1;
    m.className='mote';
    m.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${5+Math.random()*20}%;--md:${4+Math.random()*5}s;--mdelay:${Math.random()*5}s;--mop:${0.2+Math.random()*0.4};--mx:${(Math.random()-0.5)*40}px`;
    el.appendChild(m);
  }
}

function buildTodayHero(){
  const day=getDayNum(), r=RITUALS[day-1];
  const isDone=done[day-1];
  document.getElementById('todayDayNum').textContent=`Day ${day} of 30`;
  document.getElementById('todayTitle').textContent=r.name;
  document.getElementById('todayRitualLabel').textContent=`🌿 ${r.ritual.substring(0,60)}...`;
  document.getElementById('navSub').textContent=`Day ${day} · ${formatDate(new Date())}`;
  const btn=document.getElementById('todayBtn');
  if(isDone){btn.textContent='✦ Ritual completed today';btn.classList.add('done');}
}

function buildList(){
  const day=getDayNum(), list=document.getElementById('ritualsList');
  list.innerHTML='';
  RITUALS.forEach((r,i)=>{
    const isToday=i===day-1, isLocked=i>day-1, isDone=done[i];
    const dd=new Date(getJoinDate()); dd.setDate(getJoinDate().getDate()+i);
    const card=document.createElement('div');
    card.className='ritual-card'+(isDone?' done-card':'')+(isToday?' today-card-item':'')+(isLocked?' locked':'');
    card.innerHTML=`
      <div class="ritual-card-inner">
        <div class="ritual-num">${isDone?'✦':r.num}</div>
        <div class="ritual-info">
          <div class="ritual-day-tag">${isToday?'📍 Today · ':''}${formatDate(dd)}</div>
          <div class="ritual-name">${r.name}</div>
          <div class="ritual-preview">${r.ritual}</div>
        </div>
        <div class="ritual-status">${isDone?'✅':isToday?'🌿':isLocked?'🔒':'›'}</div>
      </div>`;
    if(!isLocked) card.onclick=()=>openRitual(i);
    list.appendChild(card);
  });
}

function openTodayRitual(){ openRitual(getDayNum()-1); }

function openRitual(idx){
  const r=RITUALS[idx]; const isDone=done[idx];
  modalIdx=idx;
  const dd=new Date(getJoinDate()); dd.setDate(getJoinDate().getDate()+idx);
  document.getElementById('modalNum').textContent=r.num;
  document.getElementById('modalTitle').textContent=r.name;
  document.getElementById('modalSub').textContent=`Day ${idx+1} · ${formatDate(dd)}`;
  document.getElementById('modalRitualTitle').textContent=r.name;
  document.getElementById('modalRitualDay').textContent=`Day ${idx+1} of 30 · Cleansing & Protection`;
  document.getElementById('modalRitualBox').textContent=r.ritual;
  document.getElementById('modalBenefits').innerHTML=r.benefits.split('\n\n').map(p=>`<p>${p}</p>`).join('');
  const btn=document.getElementById('modalDoneBtn');
  if(isDone){btn.textContent='✦ Ritual completed';btn.classList.add('done');}
  else{btn.textContent='🌿 I have completed this ritual';btn.classList.remove('done');}
  document.getElementById('ritualModal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){ document.getElementById('ritualModal').classList.remove('open'); document.body.style.overflow=''; }

function markDone(){
  if(done[modalIdx])return;
  done[modalIdx]=true; localStorage.setItem('ap_rituals',JSON.stringify(done));
  syncRitualsToCloud();
  const btn=document.getElementById('modalDoneBtn');
  btn.textContent='✦ Ritual completed'; btn.classList.add('done');
  showCelebration();
  setTimeout(()=>{ buildTodayHero(); buildList(); updateProgress(); },500);
}

function updateProgress(){
  const d=Object.keys(done).length;
  document.getElementById('progressVal').textContent=`${d} / 30 rituals`;
  document.getElementById('progressFill').style.width=Math.round(d/30*100)+'%';
}

function showCelebration(){
  const msgs=['Gabriel has witnessed your offering','The ritual is sealed with divine light','Your act of faith has been received','The angels have blessed this moment'];
  document.getElementById('celebrationMsg').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  launchParticles();
  const cel=document.getElementById('celebration'); cel.classList.add('active');
  setTimeout(()=>{ cel.style.transition='opacity 0.8s ease'; cel.style.opacity='0'; setTimeout(()=>{ cel.classList.remove('active'); cel.style.opacity=''; cel.style.transition=''; },800); },3500);
}

function launchParticles(){
  const c=document.getElementById('particles'); c.innerHTML=''; c.classList.add('active');
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<40;i++){
    const p=document.createElement('div'), isStar=i%3===0;
    p.className='particle'+(isStar?' star-shape':'');
    const angle=(Math.PI*2/40)*i+(Math.random()-0.5)*0.5, dist=100+Math.random()*250;
    p.style.cssText=`left:${cx}px;top:${cy}px;--px:${Math.cos(angle)*dist}px;--py:${Math.sin(angle)*dist}px;--pd:${0.6+Math.random()}s;--pdelay:${Math.random()*0.5}s`;
    if(isStar) p.textContent='✦';
    c.appendChild(p);
  }
  setTimeout(()=>{ c.classList.remove('active'); c.innerHTML=''; },2500);
}
</script>
</body>
</html>
